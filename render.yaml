# Render blueprint: one web service serving both the API and the built SPA.
# DATABASE_URL and the auth secrets are set in the Render dashboard (sync: false).
# The service name is kept as math-atlas-api so the existing service and its
# onrender.com URL are preserved.
services:
  - type: web
    name: math-atlas-api
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    # Deploy only after the commit's GitHub Actions CI run passes.
    autoDeployTrigger: checksPass
    # --include=dev: Render sets NODE_ENV=production, which would otherwise
    # make npm ci skip the devDependencies the Vite build needs.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node server/index.ts
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "26"
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Public origin of the app. Google OAuth redirect URI:
      # https://math-atlas-api.onrender.com/api/auth/callback/google
      - key: BETTER_AUTH_URL
        value: https://math-atlas-api.onrender.com
