<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (() => {
        let stored = null;
        try {
          stored = localStorage.getItem("math-map-theme");
        } catch {}
        const prefersDark = window.matchMedia
          ? window.matchMedia("(prefers-color-scheme: dark)").matches
          : false;
        const schemes = {
          paper: "light",
          chalkboard: "dark",
          manuscript: "light",
          nocturne: "dark",
          lagoon: "light",
          deepsea: "dark",
          blossom: "light",
          aubergine: "dark",
          prism: "light",
          neon: "dark",
          journal: "light",
          seminar: "dark",
        };
        const theme = Object.prototype.hasOwnProperty.call(schemes, stored)
          ? stored
          : stored === "light"
            ? "paper"
            : stored === "dark"
              ? "chalkboard"
              : prefersDark
                ? "chalkboard"
                : "paper";
        document.documentElement.classList.toggle(
          "dark",
          schemes[theme] === "dark",
        );
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/atlas-assets/logo-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Math Atlas · Magnus Er Homeo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=STIX+Two+Text:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
      integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+"
      crossorigin="anonymous"
    />
  </head>
  <body class="antialiased overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
