<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (() => {
        let stored = null;
        try {
          stored = localStorage.getItem("math-map-theme");
        } catch {}
        const prefersDark = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)").matches : false;
        // Signature pair only: Atlas Light (paper) + Atlas Dark (chalkboard).
        // Any retired theme id falls back to the system preference.
        const theme =
          stored === "paper" || stored === "light"
            ? "paper"
            : stored === "chalkboard" || stored === "dark"
              ? "chalkboard"
              : prefersDark
                ? "chalkboard"
                : "paper";
        document.documentElement.classList.toggle("dark", theme === "chalkboard");
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Math Atlas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=STIX+Two+Text:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="antialiased overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
