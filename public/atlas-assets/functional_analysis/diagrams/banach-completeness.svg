<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="In a Banach space the tails of a Cauchy sequence shrink in diameter and the sequence converges to a limit that lies in the space">
  <rect x="0" y="0" width="320" height="200" fill="none" />
  <text x="160" y="24" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">Banach space &#160;X</text>

  <path d="M52 56 C104 30 214 34 266 70 C300 94 286 146 226 162 C160 180 70 158 46 116 C32 92 34 70 52 56 Z"
        fill="var(--dia-space,#f6f0e4)" stroke="var(--dia-ink,#27221d)" stroke-width="1.4" />

  <!-- Cauchy sequence converging; tails enclosed by shrinking balls -->
  <path d="M74 132 C108 124 132 112 156 102 C176 94 196 90 212 88"
        fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="1.6" stroke-dasharray="4 5" />
  <circle cx="156" cy="102" r="28" fill="none" stroke="var(--dia-line,#d6ccb8)" stroke-width="1.1" stroke-dasharray="3 4" />
  <circle cx="196" cy="91" r="15" fill="none" stroke="var(--dia-line,#d6ccb8)" stroke-width="1.1" stroke-dasharray="3 4" />

  <g fill="var(--dia-acc,#2457c5)">
    <circle cx="74" cy="132" r="4" /><circle cx="108" cy="120" r="3.6" />
    <circle cx="138" cy="108" r="3.2" /><circle cx="166" cy="98" r="2.9" />
    <circle cx="190" cy="92" r="2.6" /><circle cx="205" cy="89" r="2.3" />
  </g>
  <circle cx="216" cy="88" r="5" fill="var(--dia-ok,#16a34a)" />

  <text x="92" y="146" font-size="11" fill="var(--dia-acc,#2457c5)">diam(tail) &#8594; 0</text>
  <text x="224" y="84" font-size="11" fill="var(--dia-ok,#16a34a)">limit &#8712; X</text>
  <text x="160" y="188" font-size="12" text-anchor="middle" fill="var(--dia-mut,#8c8274)">completeness: every Cauchy sequence has a limit in X</text>
</svg>
