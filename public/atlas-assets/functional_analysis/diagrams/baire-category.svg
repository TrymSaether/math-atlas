<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="A complete metric space cannot be a countable union of nowhere-dense sets: one piece of any closed cover must contain an open ball">
  <rect x="0" y="0" width="320" height="200" fill="none" />
  <text x="160" y="24" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">complete metric space = &#8899; F&#8345;</text>

  <rect x="44" y="36" width="232" height="120" rx="10" fill="var(--dia-space,#f6f0e4)" stroke="var(--dia-ink,#27221d)" stroke-width="1.4" />

  <!-- thin, nowhere-dense closed pieces (1-dimensional threads) -->
  <g fill="none" stroke="var(--dia-mut,#8c8274)" stroke-width="1.1" opacity="0.8">
    <path d="M58 60 C108 50 150 70 200 56 C232 47 256 58 268 52" />
    <path d="M56 138 C104 128 150 146 198 132 C232 122 258 134 270 128" />
    <path d="M58 150 C120 142 180 152 268 142" />
    <path d="M60 48 C130 42 200 50 266 44" />
  </g>

  <!-- the piece that must be "fat": it contains an open ball, i.e. has interior -->
  <path d="M64 96 C120 80 200 80 256 96 C236 112 84 112 64 96 Z"
        fill="var(--dia-acc,#2457c5)" fill-opacity="0.16" stroke="var(--dia-acc,#2457c5)" stroke-width="1.5" />
  <circle cx="160" cy="96" r="16" fill="var(--dia-ok,#16a34a)" fill-opacity="0.18" stroke="var(--dia-ok,#16a34a)" stroke-width="1.6" />
  <circle cx="160" cy="96" r="2.6" fill="var(--dia-ok,#16a34a)" />

  <text x="70" y="92" font-size="11" font-style="italic" fill="var(--dia-acc,#2457c5)">F&#8342;</text>
  <text x="180" y="99" font-size="10.5" fill="var(--dia-ok,#16a34a)">interior</text>
  <text x="160" y="186" font-size="12" text-anchor="middle" fill="var(--dia-mut,#8c8274)">some F&#8345; is not nowhere dense &#8212; it contains an open ball</text>
</svg>
