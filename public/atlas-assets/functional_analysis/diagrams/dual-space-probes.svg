<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="A continuous linear functional foliates the space into parallel level sets and assigns each vector a scalar; the dual space collects all such probes">
  <defs>
    <marker id="ds-h" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--dia-acc,#2457c5)" /></marker>
  </defs>
  <rect x="0" y="0" width="320" height="200" fill="none" />
  <text x="98" y="24" font-size="13" font-style="italic" text-anchor="middle" fill="var(--dia-ink,#27221d)">X</text>

  <!-- the space X with the level-set foliation of x* -->
  <ellipse cx="98" cy="106" rx="62" ry="58" fill="var(--dia-space,#f6f0e4)" stroke="var(--dia-ink,#27221d)" stroke-width="1.4" />
  <g stroke="var(--dia-acc,#2457c5)" stroke-width="1.2" opacity="0.85">
    <line x1="58" y1="146" x2="118" y2="70" />
    <line x1="74" y1="156" x2="138" y2="74" />
    <line x1="44" y1="120" x2="100" y2="58" />
  </g>
  <text x="120" y="70" font-size="9.5" fill="var(--dia-acc,#2457c5)">x*=2</text>
  <text x="140" y="80" font-size="9.5" fill="var(--dia-acc,#2457c5)">x*=3</text>

  <!-- a vector x sitting on the level x* = 2 -->
  <circle cx="106" cy="98" r="4.2" fill="var(--dia-ink,#27221d)" />
  <text x="98" y="112" font-size="11" font-style="italic" fill="var(--dia-ink,#27221d)">x</text>

  <!-- evaluation arrow to the scalar field -->
  <path d="M150 96 C188 82 216 82 244 96" fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="1.8" marker-end="url(#ds-h)" />
  <text x="196" y="76" font-size="12.5" font-style="italic" text-anchor="middle" fill="var(--dia-acc,#2457c5)">x*</text>

  <!-- scalar number line K -->
  <line x1="250" y1="60" x2="250" y2="150" stroke="var(--dia-ink,#27221d)" stroke-width="1.3" />
  <g stroke="var(--dia-ink,#27221d)" stroke-width="1"><line x1="245" y1="138" x2="255" y2="138" /><line x1="245" y1="116" x2="255" y2="116" /><line x1="245" y1="94" x2="255" y2="94" /><line x1="245" y1="72" x2="255" y2="72" /></g>
  <circle cx="250" cy="94" r="4.2" fill="var(--dia-acc,#2457c5)" />
  <text x="262" y="98" font-size="11" fill="var(--dia-acc,#2457c5)">x*(x)</text>
  <text x="250" y="48" font-size="12" font-style="italic" text-anchor="middle" fill="var(--dia-ink,#27221d)">K</text>

  <text x="160" y="190" font-size="12" text-anchor="middle" fill="var(--dia-mut,#8c8274)">X* = continuous linear functionals X &#8594; K (parallel level sets)</text>
</svg>
