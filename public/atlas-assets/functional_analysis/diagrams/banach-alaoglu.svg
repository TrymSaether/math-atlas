<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="The closed dual unit ball is weak-star compact: any bounded net of functionals has a weak-star cluster point inside the ball">
  <rect x="0" y="0" width="320" height="200" fill="none" />
  <text x="160" y="24" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">dual unit ball &#160;B<tspan font-size="9" dy="3">X*</tspan></text>

  <!-- convex dual unit ball -->
  <path d="M70 70 C112 44 208 44 250 70 C284 91 280 138 232 156 C176 176 88 162 60 124 C44 102 48 84 70 70 Z"
        fill="var(--dia-fill,#e7ddc9)" fill-opacity="0.6" stroke="var(--dia-acc2,#0d9488)" stroke-width="1.8" />

  <!-- a bounded net of functionals spiralling toward a cluster point -->
  <path d="M96 138 C150 150 206 132 214 104 C220 84 196 74 178 84 C164 92 168 110 184 110 C196 110 198 100 192 96"
        fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="1.4" stroke-dasharray="3.5 4" />
  <g fill="var(--dia-acc,#2457c5)">
    <circle cx="96" cy="138" r="3.4" /><circle cx="150" cy="146" r="3.2" />
    <circle cx="206" cy="130" r="3" /><circle cx="178" cy="84" r="2.8" />
    <circle cx="184" cy="110" r="2.6" />
  </g>

  <!-- weak-star cluster point with a basic weak-star neighborhood -->
  <circle cx="190" cy="100" r="18" fill="none" stroke="var(--dia-ok,#16a34a)" stroke-width="1.3" stroke-dasharray="3.5 3.5" />
  <circle cx="190" cy="100" r="4.4" fill="var(--dia-ok,#16a34a)" />

  <text x="206" y="98" font-size="10.5" fill="var(--dia-ok,#16a34a)">cluster point</text>
  <text x="160" y="188" font-size="12" text-anchor="middle" fill="var(--dia-mut,#8c8274)">weak-* topology &#963;(X*,X) makes the bounded ball compact</text>
</svg>
