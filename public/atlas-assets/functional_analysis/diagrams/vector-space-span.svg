<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="Two vectors u and v generate a lattice of linear combinations spanning the plane, with the parallelogram for u plus v highlighted">
  <defs>
    <marker id="vs-u" markerWidth="8" markerHeight="8" refX="5.6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="var(--dia-acc,#2457c5)" />
    </marker>
    <marker id="vs-v" markerWidth="8" markerHeight="8" refX="5.6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="var(--dia-acc2,#0d9488)" />
    </marker>
    <marker id="vs-w" markerWidth="8" markerHeight="8" refX="5.6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="var(--dia-acc3,#7c3aed)" />
    </marker>
  </defs>

  <!-- lattice of integer combinations i·u + j·v: lines along u (constant j) -->
  <g stroke="var(--dia-line,#d6ccb8)" stroke-width="1" fill="none" opacity="0.85">
    <polyline points="54,156 116,144 178,132 240,120" />
    <polyline points="84,104 146,92 208,80 270,68" />
    <polyline points="114,52 176,40 238,28 300,16" />
    <!-- lines along v (constant i) -->
    <polyline points="54,156 84,104 114,52" />
    <polyline points="116,144 146,92 176,40" />
    <polyline points="178,132 208,80 238,28" />
    <polyline points="240,120 270,68 300,16" />
  </g>
  <!-- lattice points -->
  <g fill="var(--dia-mut,#8c8274)">
    <circle cx="178" cy="132" r="2" /><circle cx="240" cy="120" r="2" />
    <circle cx="84" cy="104" r="2" /><circle cx="208" cy="80" r="2" /><circle cx="270" cy="68" r="2" />
    <circle cx="114" cy="52" r="2" /><circle cx="176" cy="40" r="2" /><circle cx="238" cy="28" r="2" /><circle cx="300" cy="16" r="2" />
  </g>

  <!-- highlighted parallelogram 0, u, u+v, v -->
  <path d="M54 156 L116 144 L146 92 L84 104 Z"
        fill="var(--dia-acc3-fill,#ede9fe)" stroke="none" opacity="0.7" />

  <!-- resultant u + v -->
  <line x1="54" y1="156" x2="146" y2="92" stroke="var(--dia-acc3,#7c3aed)" stroke-width="2" marker-end="url(#vs-w)" />
  <!-- basis vectors -->
  <line x1="54" y1="156" x2="116" y2="144" stroke="var(--dia-acc,#2457c5)" stroke-width="2.3" marker-end="url(#vs-u)" />
  <line x1="54" y1="156" x2="84" y2="104" stroke="var(--dia-acc2,#0d9488)" stroke-width="2.3" marker-end="url(#vs-v)" />
  <circle cx="54" cy="156" r="3.6" fill="var(--dia-ink,#27221d)" />

  <text x="46" y="170" font-size="12" fill="var(--dia-ink,#27221d)">0</text>
  <text x="120" y="159" font-size="13" font-style="italic" fill="var(--dia-acc,#2457c5)">u</text>
  <text x="64" y="98" font-size="13" font-style="italic" fill="var(--dia-acc2,#0d9488)">v</text>
  <text x="150" y="86" font-size="12.5" fill="var(--dia-acc3,#7c3aed)">u+v</text>
  <text x="160" y="190" font-size="12" text-anchor="middle" fill="var(--dia-mut,#8c8274)">span{u, v} = all combinations &#945;u + &#946;v</text>
</svg>
