<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="An open ball B(x,r); every interior point y contains a smaller ball B(y,s) inside it, so open balls form a basis for the metric topology">
  <rect x="0" y="0" width="320" height="200" fill="none" />

  <!-- open ball B(x, r) -->
  <circle cx="132" cy="104" r="78" fill="var(--dia-int,#e4ecfb)" stroke="var(--dia-acc,#2457c5)" stroke-width="1.7" stroke-dasharray="6 4" opacity="0.95" />
  <!-- the smaller ball B(y, s) that fits inside, with s = r - d(x,y) -->
  <circle cx="170" cy="84" r="30" fill="var(--dia-acc2,#0d9488)" fill-opacity="0.14" stroke="var(--dia-acc2,#0d9488)" stroke-width="1.7" />

  <!-- radius r of the big ball -->
  <line x1="132" y1="104" x2="132" y2="26" stroke="var(--dia-acc,#2457c5)" stroke-width="1.4" />
  <text x="138" y="48" font-size="12" font-style="italic" fill="var(--dia-acc,#2457c5)">r</text>
  <!-- radius s of the small ball -->
  <line x1="170" y1="84" x2="170" y2="54" stroke="var(--dia-acc2,#0d9488)" stroke-width="1.4" />
  <text x="175" y="70" font-size="12" font-style="italic" fill="var(--dia-acc2,#0d9488)">s</text>
  <!-- distance d(x,y) -->
  <line x1="132" y1="104" x2="170" y2="84" stroke="var(--dia-boundary,#dc2626)" stroke-width="1.5" stroke-dasharray="3.5 3.5" />
  <text x="146" y="103" font-size="11" fill="var(--dia-boundary,#dc2626)">d(x,y)</text>

  <circle cx="132" cy="104" r="4" fill="var(--dia-ink,#27221d)" />
  <circle cx="170" cy="84" r="4" fill="var(--dia-ink,#27221d)" />
  <text x="122" y="118" font-size="13" font-style="italic" fill="var(--dia-ink,#27221d)">x</text>
  <text x="176" y="98" font-size="13" font-style="italic" fill="var(--dia-ink,#27221d)">y</text>

  <text x="232" y="150" font-size="13" font-style="italic" fill="var(--dia-acc,#2457c5)">B(x,r)</text>
  <text x="160" y="192" font-size="12" text-anchor="middle" fill="var(--dia-mut,#8c8274)">each interior point y holds a ball B(y,s) &#8838; B(x,r)</text>
</svg>
