  <text x="241" y="39" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">representer</text>
  <text x="160" y="71" font-size="12" text-anchor="middle" fill="var(--dia-acc,#2457c5)">phi</text>
  <text x="160" y="137" font-size="12" text-anchor="middle" fill="var(--dia-mut,#8c8274)">phi(f)=int f dmu or phi(x)=&lt;x,y&gt;</text>
