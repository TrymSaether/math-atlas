<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="On a Hilbert space every continuous functional is the inner product with a unique representer vector that is orthogonal to the kernel hyperplane">
  <defs>
    <marker id="rz-y" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--dia-acc,#2457c5)" /></marker>
    <marker id="rz-x" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--dia-acc2,#0d9488)" /></marker>
  </defs>
  <rect x="0" y="0" width="320" height="200" fill="none" />
  <text x="160" y="24" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">Hilbert space &#160;H</text>

  <!-- kernel hyperplane phi = 0 -->
  <line x1="62" y1="150" x2="240" y2="74" stroke="var(--dia-ink,#27221d)" stroke-width="1.6" />
  <!-- parallel level sets phi = const -->
  <line x1="92" y1="166" x2="270" y2="90" stroke="var(--dia-line,#d6ccb8)" stroke-width="1.1" stroke-dasharray="5 5" />
  <line x1="40" y1="124" x2="208" y2="52" stroke="var(--dia-line,#d6ccb8)" stroke-width="1.1" stroke-dasharray="5 5" />

  <!-- representer y, orthogonal to the kernel -->
  <line x1="150" y1="112" x2="186" y2="148" stroke="var(--dia-acc,#2457c5)" stroke-width="2.2" marker-end="url(#rz-y)" />
  <path d="M150 112 L161 117 L156 128" fill="none" stroke="var(--dia-ink,#27221d)" stroke-width="1" />
  <!-- a vector x and its projection onto y giving phi(x) -->
  <line x1="150" y1="112" x2="214" y2="118" stroke="var(--dia-acc2,#0d9488)" stroke-width="2" marker-end="url(#rz-x)" />
  <line x1="214" y1="118" x2="178" y2="138" stroke="var(--dia-line,#d6ccb8)" stroke-width="1.1" stroke-dasharray="3.5 3.5" />
  <circle cx="150" cy="112" r="3.4" fill="var(--dia-ink,#27221d)" />

  <text x="190" y="150" font-size="12" font-style="italic" fill="var(--dia-acc,#2457c5)">y</text>
  <text x="218" y="116" font-size="12" font-style="italic" fill="var(--dia-acc2,#0d9488)">x</text>
  <text x="60" y="146" font-size="10.5" fill="var(--dia-mut,#8c8274)">&#966;=0</text>

  <text x="160" y="190" font-size="12" text-anchor="middle" fill="var(--dia-mut,#8c8274)">&#966;(x)=&#10216;x, y&#10217; with a unique representer y &#8869; ker &#966;</text>
</svg>
