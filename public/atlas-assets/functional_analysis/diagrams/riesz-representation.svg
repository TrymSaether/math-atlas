<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="Riesz representation identifies functionals with vectors or measures">
  <rect x="0" y="0" width="320" height="180" fill="none" />
  <rect x="43" y="48" width="78" height="66" rx="6" fill="var(--dia-space,#f6f0e4)" stroke="var(--dia-ink,#27221d)" stroke-width="1.4" />
  <path d="M55 91 C68 69 82 70 96 86 C104 95 110 90 116 77" fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="1.8" />
  <path d="M126 81 C152 55 174 55 200 81" fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="1.8" marker-end="url(#rz-arrow)" />
  <rect x="202" y="48" width="78" height="66" rx="6" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#27221d)" stroke-width="1.4" />
  <line x1="222" y1="94" x2="262" y2="94" stroke="var(--dia-line,#d6ccb8)" stroke-width="1" />
  <circle cx="235" cy="79" r="5" fill="var(--dia-acc2,#0d9488)" />
