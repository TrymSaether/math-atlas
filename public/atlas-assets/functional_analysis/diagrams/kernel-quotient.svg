<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="The kernel of an operator collapses to zero">
  <rect x="0" y="0" width="320" height="180" fill="none" />
  <ellipse cx="91" cy="88" rx="52" ry="48" fill="var(--dia-space,#f6f0e4)" stroke="var(--dia-ink,#27221d)" stroke-width="1.4" />
  <line x1="48" y1="108" x2="134" y2="68" stroke="var(--dia-boundary,#dc2626)" stroke-width="2.6" />
  <circle cx="80" cy="93" r="4" fill="var(--dia-boundary,#dc2626)" />
  <circle cx="110" cy="79" r="4" fill="var(--dia-boundary,#dc2626)" />
  <circle cx="100" cy="119" r="4" fill="var(--dia-acc,#2457c5)" />
  <path d="M143 90 C166 67 188 67 211 90" fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="1.8" marker-end="url(#ker-arrow)" />
  <ellipse cx="248" cy="88" rx="48" ry="45" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#27221d)" stroke-width="1.4" />
  <circle cx="248" cy="88" r="5" fill="var(--dia-boundary,#dc2626)" />
  <circle cx="268" cy="65" r="4" fill="var(--dia-acc,#2457c5)" />
  <text x="91" y="33" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">X</text>
  <text x="248" y="33" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">Y</text>
  <text x="63" y="72" font-size="11" fill="var(--dia-boundary,#dc2626)">ker T</text>
  <text x="160" y="65" font-size="12" text-anchor="middle" fill="var(--dia-acc,#2457c5)">T</text>
  <text x="160" y="158" font-size="12" text-anchor="middle" fill="var(--dia-mut,#8c8274)">vectors killed by T map to 0</text>
  <defs>
    <marker id="ker-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="var(--dia-acc,#2457c5)" />
    </marker>
  </defs>
</svg>
