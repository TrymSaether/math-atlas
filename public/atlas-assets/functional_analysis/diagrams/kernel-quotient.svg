<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="The kernel of T is a subspace mapping to zero; parallel cosets x plus the kernel each collapse to a single image point">
  <defs>
    <marker id="kq-h" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--dia-acc,#2457c5)" /></marker>
  </defs>
  <rect x="0" y="0" width="320" height="200" fill="none" />
  <text x="86" y="26" font-size="13" font-style="italic" text-anchor="middle" fill="var(--dia-ink,#27221d)">X</text>
  <text x="246" y="26" font-size="13" font-style="italic" text-anchor="middle" fill="var(--dia-ink,#27221d)">Y</text>

  <!-- domain -->
  <ellipse cx="86" cy="104" rx="58" ry="56" fill="var(--dia-space,#f6f0e4)" stroke="var(--dia-ink,#27221d)" stroke-width="1.4" />
  <!-- kernel: a subspace through 0 -->
  <line x1="44" y1="138" x2="128" y2="70" stroke="var(--dia-boundary,#dc2626)" stroke-width="2.6" />
  <!-- two parallel cosets x + ker T -->
  <line x1="40" y1="112" x2="116" y2="50" stroke="var(--dia-acc,#2457c5)" stroke-width="1.5" stroke-dasharray="5 4" />
  <line x1="56" y1="160" x2="140" y2="92" stroke="var(--dia-acc,#2457c5)" stroke-width="1.5" stroke-dasharray="5 4" />
  <circle cx="86" cy="104" r="3.4" fill="var(--dia-ink,#27221d)" />
  <text x="58" y="74" font-size="11" font-style="italic" fill="var(--dia-boundary,#dc2626)">ker T</text>
  <text x="74" y="116" font-size="10" fill="var(--dia-ink,#27221d)">0</text>

  <!-- T -->
  <path d="M150 104 C176 84 196 84 200 104" fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="1.8" marker-end="url(#kq-h)" />
  <text x="176" y="80" font-size="13" font-style="italic" text-anchor="middle" fill="var(--dia-acc,#2457c5)">T</text>

  <!-- codomain: kernel -> 0, cosets -> distinct points -->
  <ellipse cx="246" cy="104" rx="50" ry="52" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#27221d)" stroke-width="1.4" />
  <circle cx="246" cy="118" r="5.2" fill="var(--dia-boundary,#dc2626)" />
  <circle cx="262" cy="84" r="4" fill="var(--dia-acc,#2457c5)" />
  <circle cx="230" cy="70" r="4" fill="var(--dia-acc,#2457c5)" />
  <text x="252" y="132" font-size="10" fill="var(--dia-boundary,#dc2626)">0</text>

  <text x="160" y="190" font-size="12" text-anchor="middle" fill="var(--dia-mut,#8c8274)">ker T is a subspace; cosets x+ker T &#8594; single points (X/ker T &#8773; im T)</text>
</svg>
