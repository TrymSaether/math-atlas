<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="Two norms are equivalent when one unit ball is sandwiched between scaled copies of the other: an inscribed square, a circle, and a circumscribed square">
  <rect x="0" y="0" width="320" height="200" fill="none" />

  <!-- circumscribed square: C * B_a -->
  <rect x="106" y="44" width="108" height="108" fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="1.8" />
  <!-- the ball B_b (circle) -->
  <circle cx="160" cy="98" r="54" fill="var(--dia-fill2,#ddd1bd)" fill-opacity="0.5" stroke="var(--dia-acc3,#7c3aed)" stroke-width="1.9" />
  <!-- inscribed square: c * B_a (corners on the circle) -->
  <polygon points="160,60 198,98 160,136 122,98" fill="var(--dia-fill,#e7ddc9)" fill-opacity="0.85" stroke="var(--dia-acc,#2457c5)" stroke-width="1.8" />

  <circle cx="160" cy="98" r="3.2" fill="var(--dia-ink,#27221d)" />

  <text x="160" y="38" font-size="11.5" text-anchor="middle" fill="var(--dia-acc,#2457c5)">C&#183;B<tspan font-size="9" dy="3">a</tspan></text>
  <text x="222" y="62" font-size="11.5" fill="var(--dia-acc3,#7c3aed)">B<tspan font-size="9" dy="3">b</tspan></text>
  <text x="160" y="101" font-size="10.5" text-anchor="middle" fill="var(--dia-acc,#2457c5)">c&#183;B<tspan font-size="8" dy="2">a</tspan></text>

  <text x="160" y="188" font-size="12" text-anchor="middle" fill="var(--dia-mut,#8c8274)">c&#183;B<tspan font-size="9" dy="3">a</tspan><tspan dy="-3"> &#8838; B</tspan><tspan font-size="9" dy="3">b</tspan><tspan dy="-3"> &#8838; C&#183;B</tspan><tspan font-size="9" dy="3">a</tspan><tspan dy="-3"> &#8660; equivalent norms</tspan></text>
</svg>
