<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="The adjoint moves an operator to dual spaces by precomposition">
  <rect x="0" y="0" width="320" height="180" fill="none" />
  <rect x="47" y="42" width="70" height="44" rx="6" fill="var(--dia-space,#f6f0e4)" stroke="var(--dia-ink,#27221d)" stroke-width="1.3" />
  <rect x="203" y="42" width="70" height="44" rx="6" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#27221d)" stroke-width="1.3" />
  <rect x="47" y="112" width="70" height="44" rx="6" fill="var(--dia-fill2,#ddd1bd)" stroke="var(--dia-acc2,#0d9488)" stroke-width="1.3" />
  <rect x="203" y="112" width="70" height="44" rx="6" fill="var(--dia-fill2,#ddd1bd)" stroke="var(--dia-acc2,#0d9488)" stroke-width="1.3" />
  <path d="M118 64 L199 64" stroke="var(--dia-acc,#2457c5)" stroke-width="1.8" marker-end="url(#adj-a)" />
  <path d="M201 134 L121 134" stroke="var(--dia-acc2,#0d9488)" stroke-width="1.8" marker-end="url(#adj-b)" />
  <path d="M238 88 L238 109" stroke="var(--dia-line,#d6ccb8)" stroke-width="1.2" stroke-dasharray="4 4" />
  <path d="M82 88 L82 109" stroke="var(--dia-line,#d6ccb8)" stroke-width="1.2" stroke-dasharray="4 4" />
  <text x="82" y="68" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">X</text>
  <text x="238" y="68" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">Y</text>
  <text x="160" y="57" font-size="12" text-anchor="middle" fill="var(--dia-acc,#2457c5)">T</text>
  <text x="82" y="139" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">X*</text>
  <text x="238" y="139" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">Y*</text>
  <text x="160" y="128" font-size="12" text-anchor="middle" fill="var(--dia-acc2,#0d9488)">T*</text>
  <text x="160" y="171" font-size="11" text-anchor="middle" fill="var(--dia-mut,#8c8274)">T*y* = y* o T</text>
  <defs>
    <marker id="adj-a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="var(--dia-acc,#2457c5)" />
    </marker>
    <marker id="adj-b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="var(--dia-acc2,#0d9488)" />
    </marker>
  </defs>
</svg>
