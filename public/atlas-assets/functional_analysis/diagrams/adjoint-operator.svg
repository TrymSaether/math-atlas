<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="The adjoint is precomposition: a functional on Y pulls back along T to a functional on X, satisfying the pairing identity">
  <defs>
    <marker id="adj-b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--dia-acc,#2457c5)" /></marker>
    <marker id="adj-t" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--dia-acc2,#0d9488)" /></marker>
    <marker id="adj-p" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--dia-acc3,#7c3aed)" /></marker>
  </defs>
  <rect x="0" y="0" width="320" height="200" fill="none" />

  <circle cx="64" cy="62" r="16" fill="var(--dia-space,#f6f0e4)" stroke="var(--dia-ink,#27221d)" stroke-width="1.3" />
  <circle cx="252" cy="62" r="16" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#27221d)" stroke-width="1.3" />
  <circle cx="158" cy="150" r="17" fill="var(--dia-fill2,#ddd1bd)" stroke="var(--dia-ink,#27221d)" stroke-width="1.3" />
  <text x="64" y="67" font-size="14" font-style="italic" text-anchor="middle" fill="var(--dia-ink,#27221d)">X</text>
  <text x="252" y="67" font-size="14" font-style="italic" text-anchor="middle" fill="var(--dia-ink,#27221d)">Y</text>
  <text x="158" y="155" font-size="13.5" font-style="italic" text-anchor="middle" fill="var(--dia-ink,#27221d)">K</text>

  <!-- T : X -> Y -->
  <line x1="82" y1="62" x2="232" y2="62" stroke="var(--dia-acc,#2457c5)" stroke-width="2" marker-end="url(#adj-b)" />
  <text x="157" y="52" font-size="13" font-style="italic" text-anchor="middle" fill="var(--dia-acc,#2457c5)">T</text>
  <!-- y* : Y -> K -->
  <line x1="244" y1="77" x2="173" y2="138" stroke="var(--dia-acc2,#0d9488)" stroke-width="2" marker-end="url(#adj-t)" />
  <text x="223" y="116" font-size="13" font-style="italic" fill="var(--dia-acc2,#0d9488)">y*</text>
  <!-- T*y* = y* o T : X -> K -->
  <line x1="72" y1="77" x2="142" y2="138" stroke="var(--dia-acc3,#7c3aed)" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#adj-p)" />
  <text x="70" y="120" font-size="12.5" font-style="italic" text-anchor="end" fill="var(--dia-acc3,#7c3aed)">T*y*</text>

  <text x="160" y="190" font-size="12.5" text-anchor="middle" fill="var(--dia-mut,#8c8274)">T*y* = y* &#8728; T,&#160;&#160; so &#160;&#10216;T*y*, x&#10217; = &#10216;y*, Tx&#10217;</text>
</svg>
