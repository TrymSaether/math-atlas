<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="The dual norm is the supremum of a functional over the unit ball, attained where a level set supports the ball; the functional points along the outward normal">
  <defs>
    <marker id="dn-h" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--dia-acc,#2457c5)" /></marker>
  </defs>
  <rect x="0" y="0" width="320" height="200" fill="none" />

  <!-- convex unit ball B_X -->
  <circle cx="138" cy="104" r="56" fill="var(--dia-fill,#e7ddc9)" fill-opacity="0.55" stroke="var(--dia-acc2,#0d9488)" stroke-width="1.8" />

  <!-- level set of x* through the centre (x* = 0) -->
  <line x1="104" y1="59" x2="176" y2="155" stroke="var(--dia-line,#d6ccb8)" stroke-width="1.2" stroke-dasharray="5 5" />
  <!-- supporting level set: x* = ||x*||, tangent at the maximiser -->
  <line x1="145" y1="29" x2="218" y2="125" stroke="var(--dia-boundary,#dc2626)" stroke-width="1.8" />

  <!-- x* points along the outward normal toward the maximiser -->
  <line x1="138" y1="104" x2="180" y2="73" stroke="var(--dia-acc,#2457c5)" stroke-width="2" marker-end="url(#dn-h)" />
  <circle cx="138" cy="104" r="3.4" fill="var(--dia-ink,#27221d)" />
  <circle cx="183" cy="71" r="5" fill="var(--dia-boundary,#dc2626)" />

  <text x="160" y="62" font-size="12.5" font-style="italic" fill="var(--dia-acc,#2457c5)">x*</text>
  <text x="190" y="64" font-size="10.5" fill="var(--dia-boundary,#dc2626)">x*(x)=&#8214;x*&#8214;</text>
  <text x="86" y="150" font-size="12" font-style="italic" fill="var(--dia-acc2,#0d9488)">B<tspan font-size="9" dy="3">X</tspan></text>
  <text x="160" y="190" font-size="12" text-anchor="middle" fill="var(--dia-mut,#8c8274)">&#8214;x*&#8214; = sup over &#8214;x&#8214;&#8804;1 of x*(x)</text>
</svg>
