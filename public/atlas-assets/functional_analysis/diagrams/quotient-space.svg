<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="A quotient space collapses a closed subspace to zero">
  <rect x="0" y="0" width="320" height="180" fill="none" />
  <ellipse cx="103" cy="92" rx="58" ry="48" fill="var(--dia-space,#f6f0e4)" stroke="var(--dia-ink,#27221d)" stroke-width="1.4" />
  <line x1="50" y1="101" x2="155" y2="65" stroke="var(--dia-acc2,#0d9488)" stroke-width="3" />
  <line x1="61" y1="124" x2="166" y2="88" stroke="var(--dia-line,#d6ccb8)" stroke-width="1.2" />
  <line x1="40" y1="80" x2="145" y2="44" stroke="var(--dia-line,#d6ccb8)" stroke-width="1.2" />
  <circle cx="122" cy="83" r="4.5" fill="var(--dia-acc,#2457c5)" />
  <path d="M165 90 C184 90 195 90 214 90" fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="1.8" marker-end="url(#q-arrow)" />
  <ellipse cx="252" cy="92" rx="38" ry="48" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#27221d)" stroke-width="1.4" />
  <circle cx="252" cy="92" r="5" fill="var(--dia-acc2,#0d9488)" />
  <circle cx="264" cy="73" r="4.2" fill="var(--dia-acc,#2457c5)" />
  <circle cx="239" cy="115" r="4.2" fill="var(--dia-acc,#2457c5)" />
  <text x="103" y="33" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">X with closed Y</text>
  <text x="252" y="33" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">X/Y</text>
  <text x="159" y="79" font-size="12" fill="var(--dia-acc,#2457c5)">Q</text>
  <text x="72" y="70" font-size="11" fill="var(--dia-acc2,#0d9488)">Y</text>
  <text x="160" y="163" font-size="12" text-anchor="middle" fill="var(--dia-mut,#8c8274)">all vectors differing by Y become one coset</text>
  <defs>
    <marker id="q-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="var(--dia-acc,#2457c5)" />
    </marker>
  </defs>
</svg>
