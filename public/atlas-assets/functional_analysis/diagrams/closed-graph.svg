<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="The graph of T in the product X times Y is closed: a sequence of graph points converging in the product has its limit on the graph, so y equals Tx">
  <rect x="0" y="0" width="320" height="200" fill="none" />
  <text x="160" y="22" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">graph(T) &#8838; X &#215; Y</text>

  <!-- product axes -->
  <line x1="60" y1="160" x2="284" y2="160" stroke="var(--dia-ink,#27221d)" stroke-width="1.2" />
  <line x1="60" y1="160" x2="60" y2="40" stroke="var(--dia-ink,#27221d)" stroke-width="1.2" />
  <text x="288" y="164" font-size="12" font-style="italic" fill="var(--dia-mut,#8c8274)">X</text>
  <text x="52" y="42" font-size="12" font-style="italic" fill="var(--dia-mut,#8c8274)">Y</text>

  <!-- the graph -->
  <path d="M64 150 C108 132 132 104 162 86 C198 64 236 58 276 56"
        fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="2.2" />

  <!-- a sequence of graph points approaching a limit on the graph -->
  <g fill="var(--dia-acc,#2457c5)">
    <circle cx="92" cy="138" r="3.4" /><circle cx="122" cy="112" r="3.2" />
    <circle cx="152" cy="92" r="3" /><circle cx="182" cy="76" r="2.8" />
  </g>
  <circle cx="210" cy="68" r="5" fill="var(--dia-ok,#16a34a)" />

  <!-- projections of the limit to the axes: x_n -> x, Tx_n -> y -->
  <line x1="210" y1="68" x2="210" y2="160" stroke="var(--dia-line,#d6ccb8)" stroke-width="1.1" stroke-dasharray="4 4" />
  <line x1="210" y1="68" x2="60" y2="68" stroke="var(--dia-line,#d6ccb8)" stroke-width="1.1" stroke-dasharray="4 4" />
  <circle cx="210" cy="160" r="3" fill="var(--dia-mut,#8c8274)" />
  <circle cx="60" cy="68" r="3" fill="var(--dia-mut,#8c8274)" />
  <text x="214" y="172" font-size="11" font-style="italic" fill="var(--dia-mut,#8c8274)">x</text>
  <text x="46" y="72" font-size="11" font-style="italic" fill="var(--dia-mut,#8c8274)">y</text>
  <text x="216" y="62" font-size="10.5" fill="var(--dia-ok,#16a34a)">(x, y)</text>

  <text x="160" y="190" font-size="12" text-anchor="middle" fill="var(--dia-mut,#8c8274)">x&#8345;&#8594;x and Tx&#8345;&#8594;y force (x,y) on the graph: y = Tx</text>
</svg>
