<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="A basic weak neighbourhood is a finite intersection of slabs cut out by functionals; convergence is tested against every functional in the dual">
  <rect x="0" y="0" width="320" height="200" fill="none" />
  <text x="160" y="24" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">basic weak neighbourhood of x&#8320;</text>

  <!-- slab from x*_1 (horizontal pair) -->
  <line x1="50" y1="74" x2="278" y2="74" stroke="var(--dia-acc,#2457c5)" stroke-width="1.3" />
  <line x1="50" y1="126" x2="278" y2="126" stroke="var(--dia-acc,#2457c5)" stroke-width="1.3" />
  <!-- slab from x*_2 (slanted pair) -->
  <line x1="116" y1="40" x2="156" y2="168" stroke="var(--dia-acc2,#0d9488)" stroke-width="1.3" />
  <line x1="208" y1="40" x2="248" y2="168" stroke="var(--dia-acc2,#0d9488)" stroke-width="1.3" />

  <!-- their intersection: the basic weak-open set -->
  <polygon points="130.7,74 220.7,74 235.3,126 145.3,126" fill="var(--dia-acc,#2457c5)" fill-opacity="0.14" stroke="var(--dia-ink,#27221d)" stroke-width="1.1" />
  <circle cx="183" cy="100" r="4" fill="var(--dia-ink,#27221d)" />
  <text x="190" y="98" font-size="11" font-style="italic" fill="var(--dia-ink,#27221d)">x&#8320;</text>

  <text x="282" y="78" font-size="11" font-style="italic" fill="var(--dia-acc,#2457c5)">x*&#8321;</text>
  <text x="250" y="52" font-size="11" font-style="italic" fill="var(--dia-acc2,#0d9488)">x*&#8322;</text>

  <text x="160" y="190" font-size="11.5" text-anchor="middle" fill="var(--dia-mut,#8c8274)">{x : |x*&#7522;(x&#8722;x&#8320;)|&lt;&#949;}: a finite intersection of functional slabs</text>
</svg>
