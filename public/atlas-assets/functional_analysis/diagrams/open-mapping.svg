<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="A surjective bounded linear map between Banach spaces is open: the image of the open unit ball contains an open ball around the origin">
  <defs>
    <marker id="om-h" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--dia-acc,#2457c5)" /></marker>
  </defs>
  <rect x="0" y="0" width="320" height="200" fill="none" />
  <text x="74" y="28" font-size="12.5" text-anchor="middle" fill="var(--dia-ink,#27221d)">open ball B<tspan font-size="9" dy="3">X</tspan></text>
  <text x="244" y="28" font-size="12.5" text-anchor="middle" fill="var(--dia-ink,#27221d)">image T(B<tspan font-size="9" dy="3">X</tspan>)</text>

  <!-- domain open unit ball -->
  <circle cx="74" cy="108" r="48" fill="var(--dia-fill,#e7ddc9)" fill-opacity="0.6" stroke="var(--dia-acc,#2457c5)" stroke-width="1.8" stroke-dasharray="6 4" />
  <circle cx="74" cy="108" r="3.2" fill="var(--dia-ink,#27221d)" />

  <!-- T -->
  <path d="M132 108 C158 86 182 86 196 108" fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="1.9" marker-end="url(#om-h)" />
  <text x="164" y="82" font-size="13" font-style="italic" text-anchor="middle" fill="var(--dia-acc,#2457c5)">T onto</text>

  <!-- image: a convex set containing an open ball about 0 -->
  <path d="M196 96 C214 70 268 70 286 100 C296 118 286 146 256 152 C220 158 194 138 192 116 C191 108 192 102 196 96 Z"
        fill="var(--dia-fill,#e7ddc9)" fill-opacity="0.5" stroke="var(--dia-acc,#2457c5)" stroke-width="1.7" />
  <circle cx="242" cy="112" r="24" fill="var(--dia-ok,#16a34a)" fill-opacity="0.16" stroke="var(--dia-ok,#16a34a)" stroke-width="1.6" />
  <circle cx="242" cy="112" r="3.2" fill="var(--dia-ok,#16a34a)" />
  <text x="242" y="116" font-size="10" text-anchor="middle" fill="var(--dia-ok,#16a34a)">&#948;B<tspan font-size="8" dy="2">Y</tspan></text>

  <text x="160" y="190" font-size="12" text-anchor="middle" fill="var(--dia-mut,#8c8274)">T surjective &#8658; T(B<tspan font-size="9" dy="3">X</tspan><tspan dy="-3">) &#8839; &#948;B</tspan><tspan font-size="9" dy="3">Y</tspan><tspan dy="-3">, so T is open</tspan></text>

</svg>
