<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="A surjective bounded linear map between Banach spaces maps open balls to neighborhoods">
  <rect x="0" y="0" width="320" height="180" fill="none" />
  <ellipse cx="84" cy="88" rx="50" ry="47" fill="var(--dia-space,#f6f0e4)" stroke="var(--dia-ink,#27221d)" stroke-width="1.4" />
  <ellipse cx="84" cy="88" rx="26" ry="22" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-acc,#2457c5)" stroke-width="1.4" />
  <path d="M137 88 C162 60 181 60 206 88" fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="1.8" marker-end="url(#om-arrow)" />
  <ellipse cx="244" cy="88" rx="50" ry="47" fill="var(--dia-space,#f6f0e4)" stroke="var(--dia-ink,#27221d)" stroke-width="1.4" />
  <ellipse cx="244" cy="88" rx="34" ry="19" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ok,#16a34a)" stroke-width="1.5" />
  <circle cx="244" cy="88" r="5" fill="var(--dia-ok,#16a34a)" />
  <text x="84" y="35" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">open U</text>
  <text x="244" y="35" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">open T(U)</text>
  <text x="160" y="65" font-size="12" text-anchor="middle" fill="var(--dia-acc,#2457c5)">onto T</text>
  <text x="160" y="158" font-size="12" text-anchor="middle" fill="var(--dia-mut,#8c8274)">surjective bounded linear maps do not crush neighborhoods</text>
  <defs>
    <marker id="om-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="var(--dia-acc,#2457c5)" />
    </marker>
  </defs>
</svg>
