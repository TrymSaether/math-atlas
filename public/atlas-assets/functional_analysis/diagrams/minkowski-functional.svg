<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="The Minkowski functional of a convex set C is the factor by which C must be scaled to reach x; the ray from the origin to x crosses the boundary at x over p of x">
  <defs>
    <marker id="mk-h" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--dia-acc,#2457c5)" /></marker>
  </defs>
  <rect x="0" y="0" width="320" height="200" fill="none" />
  <text x="160" y="24" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">gauge of a convex set C</text>

  <!-- scaled copy t&#183;C that just reaches x -->
  <ellipse cx="138" cy="112" rx="92" ry="62" fill="none" stroke="var(--dia-line,#d6ccb8)" stroke-width="1.3" stroke-dasharray="5 5" />
  <!-- the convex set C -->
  <ellipse cx="138" cy="112" rx="52" ry="35" fill="var(--dia-fill,#e7ddc9)" fill-opacity="0.6" stroke="var(--dia-acc2,#0d9488)" stroke-width="1.8" />

  <!-- ray from 0 through the boundary to x -->
  <line x1="138" y1="112" x2="226" y2="78" stroke="var(--dia-acc,#2457c5)" stroke-width="1.9" marker-end="url(#mk-h)" />
  <circle cx="138" cy="112" r="3.6" fill="var(--dia-ink,#27221d)" />
  <circle cx="186" cy="93" r="4" fill="var(--dia-acc2,#0d9488)" />
  <circle cx="222" cy="80" r="4.6" fill="var(--dia-acc,#2457c5)" />

  <text x="130" y="126" font-size="11" fill="var(--dia-ink,#27221d)">0</text>
  <text x="232" y="78" font-size="12.5" font-style="italic" fill="var(--dia-acc,#2457c5)">x</text>
  <text x="158" y="86" font-size="10.5" fill="var(--dia-acc2,#0d9488)">x/p(x)</text>
  <text x="92" y="138" font-size="12" font-style="italic" fill="var(--dia-acc2,#0d9488)">C</text>
  <text x="206" y="58" font-size="11" fill="var(--dia-mut,#8c8274)">t&#183;C</text>

  <text x="160" y="190" font-size="12" text-anchor="middle" fill="var(--dia-mut,#8c8274)">p<tspan font-size="9" dy="3">C</tspan><tspan dy="-3">(x) = inf { t&gt;0 : x &#8712; t&#183;C };&#160; p</tspan><tspan font-size="9" dy="3">C</tspan><tspan dy="-3">=1 on &#8706;C</tspan></text>

</svg>
