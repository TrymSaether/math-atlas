<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="A function is any rule between sets; an operator is a function that also preserves linear structure, sending the origin to the origin and the unit square to a parallelogram">
  <defs>
    <marker id="fo-a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--dia-mut,#8c8274)" /></marker>
    <marker id="fo-u" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--dia-acc,#2457c5)" /></marker>
    <marker id="fo-v" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--dia-acc2,#0d9488)" /></marker>
  </defs>
  <rect x="0" y="0" width="320" height="200" fill="none" />
  <line x1="160" y1="40" x2="160" y2="168" stroke="var(--dia-line,#d6ccb8)" stroke-width="1.1" stroke-dasharray="4 5" />
  <text x="80" y="32" font-size="12.5" text-anchor="middle" fill="var(--dia-ink,#27221d)">function</text>
  <text x="240" y="32" font-size="12.5" text-anchor="middle" fill="var(--dia-ink,#27221d)">operator (linear)</text>

  <!-- LEFT: arbitrary set map -->
  <ellipse cx="46" cy="104" rx="24" ry="40" fill="var(--dia-space,#f6f0e4)" stroke="var(--dia-ink,#27221d)" stroke-width="1.3" />
  <ellipse cx="120" cy="104" rx="24" ry="40" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#27221d)" stroke-width="1.3" />
  <g fill="var(--dia-mut,#8c8274)">
    <circle cx="46" cy="78" r="3.2" /><circle cx="46" cy="104" r="3.2" /><circle cx="46" cy="130" r="3.2" />
    <circle cx="120" cy="84" r="3.2" /><circle cx="120" cy="118" r="3.2" />
  </g>
  <path d="M52 78 C82 80 96 82 113 84" fill="none" stroke="var(--dia-mut,#8c8274)" stroke-width="1.4" marker-end="url(#fo-a)" />
  <path d="M52 104 C84 100 98 88 113 86" fill="none" stroke="var(--dia-mut,#8c8274)" stroke-width="1.4" marker-end="url(#fo-a)" />
  <path d="M52 130 C84 128 98 122 113 119" fill="none" stroke="var(--dia-mut,#8c8274)" stroke-width="1.4" marker-end="url(#fo-a)" />
  <text x="83" y="160" font-size="10.5" text-anchor="middle" fill="var(--dia-mut,#8c8274)">any rule x &#8614; f(x)</text>

  <!-- RIGHT: linear map sends the unit square to a parallelogram, 0 to 0 -->
  <!-- domain unit square (faint) -->
  <rect x="196" y="98" width="40" height="40" fill="none" stroke="var(--dia-line,#d6ccb8)" stroke-width="1.2" stroke-dasharray="4 4" />
  <!-- image parallelogram -->
  <polygon points="196,138 248,128 268,86 216,96" fill="var(--dia-acc,#2457c5)" fill-opacity="0.12" stroke="none" />
  <!-- basis images Te1, Te2 -->
  <line x1="196" y1="138" x2="246" y2="129" stroke="var(--dia-acc,#2457c5)" stroke-width="2.1" marker-end="url(#fo-u)" />
  <line x1="196" y1="138" x2="214" y2="98" stroke="var(--dia-acc2,#0d9488)" stroke-width="2.1" marker-end="url(#fo-v)" />
  <circle cx="196" cy="138" r="3.6" fill="var(--dia-ink,#27221d)" />
  <text x="186" y="150" font-size="11" fill="var(--dia-ink,#27221d)">0</text>
  <text x="250" y="130" font-size="11" font-style="italic" fill="var(--dia-acc,#2457c5)">Te&#8321;</text>
  <text x="200" y="92" font-size="11" font-style="italic" fill="var(--dia-acc2,#0d9488)">Te&#8322;</text>

  <text x="160" y="190" font-size="12" text-anchor="middle" fill="var(--dia-mut,#8c8274)">every operator is a function; it also preserves + and scalar &#183;</text>
</svg>
