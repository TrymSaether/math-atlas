<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="A sublinear functional p is convex and positively homogeneous, forming a wedge through the origin; a linear functional f lies below it everywhere">
  <rect x="0" y="0" width="320" height="200" fill="none" />

  <!-- axes -->
  <line x1="50" y1="140" x2="278" y2="140" stroke="var(--dia-line,#d6ccb8)" stroke-width="1.1" />
  <line x1="160" y1="160" x2="160" y2="34" stroke="var(--dia-line,#d6ccb8)" stroke-width="1.1" />

  <!-- region f <= p -->
  <path d="M160 140 L60 80 L60 162 Z" fill="var(--dia-acc,#2457c5)" fill-opacity="0.07" stroke="none" />
  <path d="M160 140 L260 70 L260 116 Z" fill="var(--dia-acc,#2457c5)" fill-opacity="0.07" stroke="none" />

  <!-- p: convex, positively homogeneous wedge through 0 -->
  <polyline points="60,80 160,140 260,70" fill="none" stroke="var(--dia-acc2,#0d9488)" stroke-width="2.2" />
  <!-- f: linear, dominated by p -->
  <line x1="60" y1="162" x2="260" y2="116" stroke="var(--dia-acc,#2457c5)" stroke-width="2" />

  <circle cx="160" cy="140" r="3.4" fill="var(--dia-ink,#27221d)" />
  <text x="78" y="76" font-size="12" font-style="italic" fill="var(--dia-acc2,#0d9488)">p(x)</text>
  <text x="234" y="112" font-size="12" font-style="italic" fill="var(--dia-acc,#2457c5)">f(x)</text>

  <text x="160" y="190" font-size="12" text-anchor="middle" fill="var(--dia-mut,#8c8274)">f(x) &#8804; p(x): p convex and positively homogeneous</text>
</svg>
