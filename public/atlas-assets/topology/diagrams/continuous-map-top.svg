<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <defs>
        <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-ink,#27221d)" />
        </marker>
        <marker id="ara" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-acc,#2457c5)" />
        </marker>
    </defs>
    <!-- Space X -->
    <ellipse cx="76" cy="95" rx="57" ry="67" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#27221d)" stroke-width="1.6" />
    <text x="76" y="27" font-size="15" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">X</text>
    <!-- Space Y -->
    <ellipse cx="244" cy="95" rx="57" ry="67" fill="var(--dia-fill2,#f4efe6)" stroke="var(--dia-ink,#27221d)" stroke-width="1.6" />
    <text x="244" y="27" font-size="15" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">Y</text>
    <!-- Open set V in Y (accent, dashed = open) -->
    <ellipse cx="252" cy="98" rx="30" ry="34" fill="var(--dia-acc,#2457c5)" fill-opacity="0.13"
        stroke="var(--dia-acc,#2457c5)" stroke-width="1.4" stroke-dasharray="4,3" />
    <text x="254" y="68" font-size="12" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">V</text>
    <!-- Preimage f⁻¹(V) in X (dashed = open) -->
    <ellipse cx="68" cy="98" rx="30" ry="34" fill="var(--dia-ink,#27221d)" fill-opacity="0.07"
        stroke="var(--dia-ink,#27221d)" stroke-width="1.4" stroke-dasharray="4,3" />
    <text x="48" y="68" font-size="10" fill="var(--dia-ink,#27221d)" font-style="italic">f⁻¹(V)</text>
    <!-- Main f arrow -->
    <path d="M133,60 C155,46 175,46 197,60" fill="none" stroke="var(--dia-ink,#27221d)" stroke-width="1.5" marker-end="url(#ar)" />
    <text x="165" y="44" font-size="13" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">f</text>
    <!-- Caption -->
    <text x="160" y="172" font-size="10" fill="var(--dia-acc,#2457c5)" text-anchor="middle">f⁻¹(V) open whenever V open</text>
</svg>
