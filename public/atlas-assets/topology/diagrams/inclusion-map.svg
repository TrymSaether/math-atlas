<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <defs>
        <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-ink,#27221d)" />
        </marker>
    </defs>

    <!-- Ambient space X -->
    <ellipse cx="160" cy="88" rx="136" ry="66" fill="var(--dia-paper,#fffdf8)" stroke="var(--dia-ink,#27221d)"
        stroke-width="1.6" />
    <text x="260" y="50" font-size="15" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">X</text>

    <!-- Subset A -->
    <ellipse cx="118" cy="92" rx="62" ry="42" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-acc,#2457c5)"
        stroke-width="1.6" />
    <text x="72" y="70" font-size="14" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">A</text>

    <!-- Point r in A -->
    <circle cx="118" cy="96" r="3.4" fill="var(--dia-acc,#2457c5)" />
    <text x="118" y="113" font-size="11" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">r</text>

    <!-- Inclusion arrow -->
    <path d="M181,92 C205,78 230,78 254,91" fill="none" stroke="var(--dia-ink,#27221d)" stroke-width="1.5"
        marker-end="url(#ar)" />
    <text x="218" y="76" font-size="13" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">i</text>

    <!-- Image point in X -->
    <circle cx="258" cy="93" r="3.4" fill="var(--dia-ink,#27221d)" />
    <text x="258" y="111" font-size="11" fill="var(--dia-ink,#27221d)" text-anchor="middle"
        font-style="italic">i(r)</text>

    <!-- Caption -->
    <text x="160" y="166" font-size="11" fill="var(--dia-acc,#2457c5)" text-anchor="middle">
        i: A ↪ X, i(r) = r, A ⊆ X
    </text>
</svg>
