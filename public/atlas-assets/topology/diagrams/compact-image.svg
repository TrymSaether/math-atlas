<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <defs>
        <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-ink,#27221d)" />
        </marker>
    </defs>
    <!-- X: compact (rectangle with finite cover) -->
    <rect x="18" y="55" width="120" height="80" rx="3" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#27221d)"
        stroke-width="1.6" />
    <text x="78" y="46" font-size="12" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">X</text>
    <!-- cover of X (two strips) -->
    <rect x="18" y="46" width="66" height="18" rx="2" fill="var(--dia-acc,#2457c5)" opacity="0.35"
        stroke="var(--dia-acc,#2457c5)" stroke-width="1" stroke-dasharray="3,2" />
    <rect x="72" y="46" width="66" height="18" rx="2" fill="var(--dia-acc2,#0d9488)" opacity="0.35"
        stroke="var(--dia-acc2,#0d9488)" stroke-width="1" stroke-dasharray="3,2" />
    <text x="78" y="37" font-size="8" fill="var(--dia-mut,#8c8274)" text-anchor="middle">compact</text>
    <!-- f arrow -->
    <path d="M138,90 C160,72 175,72 184,86" fill="none" stroke="var(--dia-ink,#27221d)" stroke-width="1.5"
        marker-end="url(#ar)" />
    <text x="162" y="68" font-size="12" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">f</text>
    <!-- f(X): compact image (smaller rect inside Y) -->
    <rect x="182" y="55" width="120" height="80" rx="3" fill="var(--dia-fill2,#f4efe6)" stroke="var(--dia-ink,#27221d)"
        stroke-width="1.6" />
    <text x="242" y="46" font-size="12" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">Y</text>
    <rect x="198" y="65" width="88" height="60" rx="3" fill="var(--dia-acc,#2457c5)" fill-opacity="0.15"
        stroke="var(--dia-acc,#2457c5)" stroke-width="1.5" />
    <!-- cover of f(X) -->
    <rect x="198" y="55" width="46" height="18" rx="2" fill="var(--dia-acc,#2457c5)" opacity="0.35"
        stroke="var(--dia-acc,#2457c5)" stroke-width="1" stroke-dasharray="3,2" />
    <rect x="240" y="55" width="46" height="18" rx="2" fill="var(--dia-acc2,#0d9488)" opacity="0.35"
        stroke="var(--dia-acc2,#0d9488)" stroke-width="1" stroke-dasharray="3,2" />
    <text x="242" y="37" font-size="8" fill="var(--dia-acc,#2457c5)" text-anchor="middle">f(X) compact</text>
    <!-- caption -->
    <text x="160" y="160" font-size="10" fill="var(--dia-acc,#2457c5)" text-anchor="middle">continuous image of compact
        is compact</text>
</svg>
