  <g stroke="var(--dia-acc2,#0d9488)" stroke-width="1" opacity="0.6" fill="none">
    <path d="M160,76 L174,105" />
  </g>
  <g stroke="var(--dia-boundary,#dc2626)" stroke-width="1" opacity="0.6" fill="none">
    <path d="M228,74 L246,98" />
    <path d="M246,98 L224,116" />
    <path d="M224,116 L228,74" />
  </g>
  <text x="160" y="168" font-size="10" text-anchor="middle" fill="var(--dia-mut,#8c8274)">reflexive + symmetric + transitive ⇒ equivalence classes</text>
