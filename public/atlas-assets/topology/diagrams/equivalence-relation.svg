<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <rect x="34" y="28" width="252" height="128" rx="8" fill="var(--dia-space,#f6f0e4)" stroke="var(--dia-ink,#27221d)" stroke-width="1.5" />
  <text x="160" y="22" font-size="12" text-anchor="middle" fill="var(--dia-ink,#27221d)">X partitioned by ∼</text>
  <ellipse cx="92" cy="92" rx="42" ry="48" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-acc,#2457c5)" stroke-width="1.6" />
  <ellipse cx="166" cy="92" rx="34" ry="48" fill="var(--dia-fill2,#f4efe6)" stroke="var(--dia-acc2,#0d9488)" stroke-width="1.6" />
  <ellipse cx="234" cy="92" rx="38" ry="48" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-boundary,#dc2626)" stroke-width="1.6" />
  <text x="92" y="148" font-size="10" text-anchor="middle" fill="var(--dia-acc,#2457c5)">[a]</text>
  <text x="166" y="148" font-size="10" text-anchor="middle" fill="var(--dia-acc2,#0d9488)">[b]</text>
  <text x="234" y="148" font-size="10" text-anchor="middle" fill="var(--dia-boundary,#dc2626)">[c]</text>
  <circle cx="78" cy="75" r="3" fill="var(--dia-ink,#27221d)" />
  <circle cx="102" cy="92" r="3" fill="var(--dia-ink,#27221d)" />
  <circle cx="87" cy="112" r="3" fill="var(--dia-ink,#27221d)" />
  <circle cx="160" cy="76" r="3" fill="var(--dia-ink,#27221d)" />
  <circle cx="174" cy="105" r="3" fill="var(--dia-ink,#27221d)" />
  <circle cx="228" cy="74" r="3" fill="var(--dia-ink,#27221d)" />
  <circle cx="246" cy="98" r="3" fill="var(--dia-ink,#27221d)" />
  <circle cx="224" cy="116" r="3" fill="var(--dia-ink,#27221d)" />
  <!-- every pair within a class is related: the dots are mutually linked -->
  <g stroke="var(--dia-acc,#2457c5)" stroke-width="1" opacity="0.6" fill="none">
    <path d="M78,75 L102,92" />
    <path d="M102,92 L87,112" />
    <path d="M87,112 L78,75" />
