<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <defs>
    <marker id="opca" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-acc,#2457c5)" />
    </marker>
  </defs>
  <!-- locally compact X (a plane patch) -->
  <path d="M28,128 L96,52 L150,52 L82,128 Z" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#27221d)"
    stroke-width="1.4" />
  <text x="84" y="146" font-size="12" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">X (locally
    compact)</text>
  <!-- arrow: add the point at infinity -->
  <line x1="158" y1="90" x2="196" y2="90" stroke="var(--dia-acc,#2457c5)" stroke-width="1.5" marker-end="url(#opca)" />
  <text x="177" y="82" font-size="11" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">+ ∞</text>
  <!-- sphere = X ∪ {∞} -->
  <circle cx="252" cy="92" r="44" fill="var(--dia-fill2,#f4efe6)" stroke="var(--dia-ink,#27221d)" stroke-width="1.5" />
  <ellipse cx="252" cy="92" rx="44" ry="15" fill="none" stroke="var(--dia-mut,#8c8274)" stroke-width="0.9"
    stroke-dasharray="3 3" />
  <ellipse cx="252" cy="92" rx="15" ry="44" fill="none" stroke="var(--dia-mut,#8c8274)" stroke-width="0.9"
    stroke-dasharray="3 3" />
  <!-- the added point -->
  <circle cx="252" cy="48" r="3.4" fill="var(--dia-acc,#2457c5)" />
  <text x="252" y="40" font-size="12" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">∞</text>
  <text x="252" y="158" font-size="11" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">X⁺ = X ∪
    {∞}</text>
</svg>
