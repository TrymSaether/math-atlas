<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <!-- fixed endpoints -->
    <circle cx="52" cy="95" r="4" fill="var(--dia-acc,#2457c5)" />
    <text x="38" y="99" font-size="10" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">x₀</text>
    <circle cx="268" cy="95" r="4" fill="var(--dia-acc,#2457c5)" />
    <text x="282" y="99" font-size="10" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">x₁</text>
    <!-- class [γ₁]: upper paths (accent) -->
    <path d="M52,95 C110,42 210,42 268,95" fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="1.8" />
    <path d="M52,95 C110,55 210,55 268,95" fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="1"
        stroke-dasharray="3,2" />
    <text x="160" y="34" font-size="10" fill="var(--dia-acc,#2457c5)" text-anchor="middle"
        font-style="italic">[γ₁]</text>
    <!-- class [γ₂]: lower paths (ink) -->
    <path d="M52,95 C110,135 210,135 268,95" fill="none" stroke="var(--dia-ink,#27221d)" stroke-width="1.8" />
    <path d="M52,95 C110,148 210,148 268,95" fill="none" stroke="var(--dia-ink,#27221d)" stroke-width="1"
        stroke-dasharray="3,2" />
    <text x="160" y="160" font-size="10" fill="var(--dia-ink,#27221d)" text-anchor="middle"
        font-style="italic">[γ₂]</text>
    <!-- caption -->
    <text x="160" y="176" font-size="10" fill="var(--dia-mut,#8c8274)" text-anchor="middle">paths rel endpoints,
        grouped by homotopy</text>
</svg>
