<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <!-- shaded region between the two paths -->
    <path d="M70,95 C130,40 200,40 250,95 C200,150 130,150 70,95 Z" fill="var(--dia-fill,#e7ddc9)" stroke="none" />
    <!-- f₀: upper path (accent) -->
    <path d="M70,95 C130,40 200,40 250,95" fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="2" />
    <text x="160" y="52" font-size="12" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">f₀</text>
    <!-- f₁: lower path (ink) -->
    <path d="M70,95 C130,150 200,150 250,95" fill="none" stroke="var(--dia-ink,#27221d)" stroke-width="2" />
    <text x="160" y="148" font-size="12" fill="var(--dia-ink,#27221d)" text-anchor="middle"
        font-style="italic">f₁</text>
    <!-- fixed endpoints -->
    <circle cx="70" cy="95" r="4" fill="var(--dia-acc,#2457c5)" />
    <text x="50" y="99" font-size="12" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">x₀</text>
    <circle cx="250" cy="95" r="4" fill="var(--dia-acc,#2457c5)" />
    <text x="270" y="99" font-size="12" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">x₁</text>
    <!-- caption -->
    <text x="160" y="175" font-size="10" fill="var(--dia-mut,#8c8274)" text-anchor="middle">endpoints fixed throughout
        deformation</text>
</svg>
