<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <defs>
    <clipPath id="vclip"><ellipse cx="194" cy="84" rx="56" ry="36" /></clipPath>
  </defs>

  <rect x="22" y="30" width="276" height="120" rx="8" fill="var(--dia-space,#f6f0e4)" stroke="var(--dia-ink,#27221d)" stroke-width="1.5" />
  <text x="160" y="22" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">τ ⊆ 𝒫(X)</text>
  <text x="286" y="46" font-size="13" text-anchor="end" fill="var(--dia-ink,#27221d)" font-style="italic">X</text>

  <!-- two open sets U, V -->
  <ellipse cx="126" cy="84" rx="56" ry="36" fill="var(--dia-acc,#2457c5)" fill-opacity="0.12" stroke="var(--dia-acc,#2457c5)" stroke-width="1.5" />
  <ellipse cx="194" cy="84" rx="56" ry="36" fill="var(--dia-acc2,#0d9488)" fill-opacity="0.12" stroke="var(--dia-acc2,#0d9488)" stroke-width="1.5" />

  <!-- their intersection (U clipped to V): a finite intersection is open -->
  <ellipse cx="126" cy="84" rx="56" ry="36" fill="var(--dia-boundary,#dc2626)" fill-opacity="0.3" stroke="none" clip-path="url(#vclip)" />

  <text x="86" y="88" font-size="14" text-anchor="middle" fill="var(--dia-acc,#2457c5)" font-style="italic">U</text>
  <text x="234" y="88" font-size="14" text-anchor="middle" fill="var(--dia-acc2,#0d9488)" font-style="italic">V</text>
  <text x="160" y="89" font-size="12" text-anchor="middle" fill="var(--dia-boundary,#dc2626)">U∩V</text>

  <text x="160" y="138" font-size="11" text-anchor="middle" fill="var(--dia-mut,#8c8274)">∅, X, U∪V, U∩V all ∈ τ</text>
  <text x="160" y="168" font-size="10.5" text-anchor="middle" fill="var(--dia-mut,#8c8274)">open sets: closed under unions and finite intersections</text>
</svg>
