<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img"
  aria-label="Hausdorff separation: two points x and y enclosed in disjoint open sets U and V inside a topological space X">

  <!-- Space X — dashed outer boundary -->
  <ellipse cx="160" cy="94" rx="143" ry="74" fill="var(--dia-paper,#fffdf8)" stroke="var(--dia-ink,#8c8274)"
    stroke-width="1.4" stroke-dasharray="5 4" />
  <text x="292" y="38" font-size="12" fill="var(--dia-ink,#27221d)" font-style="italic">X</text>

  <!-- Open set U (left) -->
  <circle cx="96" cy="94" r="50" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-acc,#2457c5)"
    stroke-width="1.7" />

  <!-- Open set V (right) -->
  <circle cx="224" cy="94" r="50" fill="var(--dia-fill2,#f4efe6)" stroke="var(--dia-acc2,#0d9488)"
    stroke-width="1.7" />

  <!-- Point x -->
  <circle cx="96" cy="94" r="2" fill="var(--dia-acc,#2457c5)" />
  <text x="96" y="112" font-size="12" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">x</text>

  <!-- Point y -->
  <circle cx="224" cy="94" r="2" fill="var(--dia-acc2,#0d9488)" />
  <text x="224" y="112" font-size="12" fill="var(--dia-acc2,#0d9488)" text-anchor="middle" font-style="italic">y</text>

  <!-- Set labels -->
  <text x="96" y="62" font-size="12" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">U</text>
  <text x="224" y="62" font-size="12" fill="var(--dia-acc2,#0d9488)" text-anchor="middle" font-style="italic">V</text>

  <!-- x ≠ y label in gap -->
  <text x="160" y="50" font-size="10" fill="var(--dia-ink,#8c8274)" text-anchor="middle" font-style="italic">x ≠
    y</text>

  <!-- Bottom caption -->
  <text x="160" y="178" font-size="10" fill="var(--dia-ink,#8c8274)" text-anchor="middle" font-style="italic">U ∩ V = ∅,
    x ∈ U, y ∈ V</text>

</svg>
