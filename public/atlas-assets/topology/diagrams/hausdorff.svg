<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img" aria-label="Hausdorff separation: two points x and y enclosed in disjoint open sets U and V inside a topological space X">

  <!-- Space X — dashed outer boundary -->
  <ellipse cx="160" cy="94" rx="143" ry="74"
    fill="var(--dia-paper,#f4efe6)"
    stroke="var(--dia-mut,#9a8f7d)" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="292" y="38" font-size="13" fill="var(--dia-ink,#2a2520)" font-style="italic">X</text>

  <!-- Open set U (left) -->
  <ellipse cx="96" cy="94" rx="54" ry="44"
    fill="var(--dia-fill,#e7ddc9)"
    stroke="var(--dia-acc,#a8431d)" stroke-width="1.7"/>

  <!-- Open set V (right) -->
  <ellipse cx="224" cy="94" rx="54" ry="44"
    fill="var(--dia-fil2,#d6c9a8)"
    stroke="var(--dia-acc2,#1f6f6b)" stroke-width="1.7"/>

  <!-- Gap tick — visual cue for disjointness -->
  <line x1="160" y1="62" x2="160" y2="126"
    stroke="var(--dia-mut,#9a8f7d)" stroke-width="0.8" stroke-dasharray="2 3"/>

  <!-- Point x -->
  <circle cx="96" cy="94" r="3.5" fill="var(--dia-acc,#a8431d)"/>
  <text x="96" y="112" font-size="12" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">x</text>

  <!-- Point y -->
  <circle cx="224" cy="94" r="3.5" fill="var(--dia-acc2,#1f6f6b)"/>
  <text x="224" y="112" font-size="12" fill="var(--dia-acc2,#1f6f6b)" text-anchor="middle" font-style="italic">y</text>

  <!-- Set labels -->
  <text x="66" y="62" font-size="13" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">U</text>
  <text x="254" y="62" font-size="13" fill="var(--dia-acc2,#1f6f6b)" text-anchor="middle" font-style="italic">V</text>

  <!-- x ≠ y label in gap -->
  <text x="160" y="90" font-size="9.5" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle" font-style="italic">x ≠ y</text>

  <!-- Bottom caption -->
  <text x="160" y="172" font-size="11" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle" font-style="italic">U ∩ V = ∅,  x ∈ U,  y ∈ V</text>

</svg>
