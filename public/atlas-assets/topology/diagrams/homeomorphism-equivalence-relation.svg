<svg width="100%" viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader', Georgia, serif" role="img">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <ellipse cx="145" cy="158" rx="72" ry="54" fill="var(--color-background-secondary)" stroke="var(--color-text-primary)" stroke-width="1.7" stroke-opacity="0.5" style="fill:rgb(245, 244, 237);stroke:rgb(20, 20, 19);color:rgb(0, 0, 0);stroke-width:1.7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Newsreader, Georgia, serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <ellipse cx="370" cy="158" rx="72" ry="54" fill="var(--color-background-secondary)" stroke="var(--color-text-primary)" stroke-width="1.7" stroke-opacity="0.5" style="fill:rgb(245, 244, 237);stroke:rgb(20, 20, 19);color:rgb(0, 0, 0);stroke-width:1.7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Newsreader, Georgia, serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <ellipse cx="590" cy="158" rx="72" ry="54" fill="var(--color-background-secondary)" stroke="var(--color-text-primary)" stroke-width="1.7" stroke-opacity="0.5" style="fill:rgb(245, 244, 237);stroke:rgb(20, 20, 19);color:rgb(0, 0, 0);stroke-width:1.7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Newsreader, Georgia, serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <text x="145" y="70" font-size="24" text-anchor="middle" fill="var(--color-text-primary)" font-style="italic" style="fill:rgb(20, 20, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Newsreader, Georgia, serif;font-size:24px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">X</text>
  <text x="370" y="70" font-size="24" text-anchor="middle" fill="var(--color-text-primary)" font-style="italic" style="fill:rgb(20, 20, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Newsreader, Georgia, serif;font-size:24px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">Y</text>
  <text x="590" y="70" font-size="24" text-anchor="middle" fill="var(--color-text-primary)" font-style="italic" style="fill:rgb(20, 20, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Newsreader, Georgia, serif;font-size:24px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">Z</text>

  <!-- f: X→Y, start/end on ellipse boundary at y=128 -->
  <path d="M205,128 C232,88 283,88 310,128" fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="2" marker-end="url(#arr)" style="fill:none;stroke:rgb(36, 87, 197);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Newsreader, Georgia, serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="258" y="82" font-size="18" text-anchor="middle" fill="var(--dia-acc,#2457c5)" font-style="italic" style="fill:rgb(36, 87, 197);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Newsreader, Georgia, serif;font-size:18px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">f</text>

  <!-- f⁻¹: Y→X -->
  <path d="M310,188 C283,228 232,228 205,188" fill="none" stroke="var(--color-text-secondary)" stroke-width="1.5" marker-end="url(#arr)" style="fill:none;stroke:rgb(61, 61, 58);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Newsreader, Georgia, serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="258" y="244" font-size="16" text-anchor="middle" fill="var(--color-text-secondary)" font-style="italic" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Newsreader, Georgia, serif;font-size:16px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">f ⁻¹</text>

  <!-- g: Y→Z -->
  <path d="M430,128 C452,88 503,88 530,128" fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="2" marker-end="url(#arr)" style="fill:none;stroke:rgb(36, 87, 197);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Newsreader, Georgia, serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="478" y="82" font-size="18" text-anchor="middle" fill="var(--dia-acc,#2457c5)" font-style="italic" style="fill:rgb(36, 87, 197);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Newsreader, Georgia, serif;font-size:18px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">g</text>

  <!-- g⁻¹: Z→Y -->
  <path d="M530,188 C503,228 452,228 430,188" fill="none" stroke="var(--color-text-secondary)" stroke-width="1.5" marker-end="url(#arr)" style="fill:none;stroke:rgb(61, 61, 58);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Newsreader, Georgia, serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="478" y="244" font-size="16" text-anchor="middle" fill="var(--color-text-secondary)" font-style="italic" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Newsreader, Georgia, serif;font-size:16px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">g ⁻¹</text>

  <!-- g∘f: X→Z, start/end on ellipse at y=120 -->
  <path d="M196,120 C248,12,486,12 539,120" fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="2.2" marker-end="url(#arr)" style="fill:none;stroke:rgb(36, 87, 197);color:rgb(0, 0, 0);stroke-width:2.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Newsreader, Georgia, serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="368" y="34" font-size="18" text-anchor="middle" fill="var(--dia-acc,#2457c5)" font-style="italic" style="fill:rgb(36, 87, 197);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Newsreader, Georgia, serif;font-size:18px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">g ∘ f</text>

  <text x="360" y="278" font-size="14" text-anchor="middle" font-family="var(--font-sans)" fill="var(--color-text-tertiary)" style="fill:rgb(115, 114, 108);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:14px;font-weight:400;text-anchor:middle;dominant-baseline:auto">X ≅ Y and Y ≅ Z  ⟹  X ≅ Z</text>
</svg>
