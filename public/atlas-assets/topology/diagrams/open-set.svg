<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  // Arrow
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-ink,#27221d)" />
    </marker>
  </defs>

  // Space
  <rect x="34" y="30" width="136" height="126" rx="8" fill="var(--dia-space,#f6f0e4)" stroke="var(--dia-ink,#27221d)" stroke-width="1.5" />

  // Open set
  <ellipse cx="102" cy="92" rx="50" ry="38" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-acc,#2457c5)" stroke-width="1.6" />

  // Topology
  <rect x="206" y="38" width="78" height="108" rx="7" fill="var(--dia-fill2,#f4efe6)" stroke="var(--dia-ink,#27221d)" stroke-width="1.4" />

  // Labels
  <text x="102" y="24" font-size="12" text-anchor="middle" fill="var(--dia-ink,#27221d)">space X</text>
  <text x="102" y="96" font-size="12" text-anchor="middle" fill="var(--dia-acc,#2457c5)" font-style="italic">U</text>
  <text x="245" y="30" font-size="12" text-anchor="middle" fill="var(--dia-ink,#27221d)">topology τ</text>
  <text x="245" y="61" font-size="10" text-anchor="middle" fill="var(--dia-mut,#8c8274)">∅</text>
  <text x="245" y="86" font-size="10" text-anchor="middle" fill="var(--dia-acc,#2457c5)" font-style="italic">U</text>
  <text x="245" y="111" font-size="10" text-anchor="middle" fill="var(--dia-mut,#8c8274)">V</text>
  <text x="245" y="136" font-size="10" text-anchor="middle" fill="var(--dia-mut,#8c8274)">X</text>

  // Arrow
  <path d="M150,80 C168,66 206,66 232,80" fill="none" stroke="var(--dia-ink,#27221d)" stroke-width="1.4" marker-end="url(#ar)" />
  <text x="160" y="168" font-size="10" text-anchor="middle" fill="var(--dia-mut,#8c8274)">U is open exactly when U ∈ τ</text>
</svg>
