<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-ink,#27221d)" />
    </marker>
  </defs>

  <text x="160" y="22" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">
    AC: nonempty family ⇒ choice function
  </text>

  <!-- family of nonempty sets -->
  <rect x="26" y="44" width="88" height="110" rx="7"
        fill="var(--dia-space,#f6f0e4)"
        stroke="var(--dia-ink,#27221d)" stroke-width="1.4" />

  <text x="70" y="64" font-size="11" text-anchor="middle" fill="var(--dia-mut,#8c8274)">
    (Aᵢ)ᵢ∈I
  </text>

  <ellipse cx="70" cy="86" rx="28" ry="12"
           fill="var(--dia-acc-fill,rgba(36,87,197,.18))"
           stroke="var(--dia-acc,#2457c5)" stroke-width="1.25" />

  <ellipse cx="70" cy="112" rx="28" ry="12"
           fill="var(--dia-acc2-fill,rgba(13,148,136,.18))"
           stroke="var(--dia-acc2,#0d9488)" stroke-width="1.25" />

  <ellipse cx="70" cy="138" rx="28" ry="12"
           fill="var(--dia-boundary-fill,rgba(220,38,38,.16))"
           stroke="var(--dia-boundary,#dc2626)" stroke-width="1.25" />

  <!-- choice map -->
  <text x="160" y="75" font-size="12" text-anchor="middle"
        fill="var(--dia-ink,#27221d)" font-style="italic">c</text>

  <!-- chosen values -->
  <rect x="206" y="44" width="88" height="110" rx="7"
        fill="var(--dia-space,#f6f0e4)"
        stroke="var(--dia-ink,#27221d)" stroke-width="1.4" />

  <text x="250" y="64" font-size="11" text-anchor="middle" fill="var(--dia-mut,#8c8274)">
    c:I→⋃Aᵢ
  </text>

  <circle cx="250" cy="86" r="3.7" fill="var(--dia-acc,#2457c5)" />
  <circle cx="250" cy="112" r="3.7" fill="var(--dia-acc2,#0d9488)" />
  <circle cx="250" cy="138" r="3.7" fill="var(--dia-boundary,#dc2626)" />

  <path d="M98,86 C132,86 186,86 244,86"
        fill="none" stroke="var(--dia-ink,#27221d)"
        stroke-width="1.35" marker-end="url(#arrow)" />

  <path d="M98,112 C132,112 186,112 244,112"
        fill="none" stroke="var(--dia-ink,#27221d)"
        stroke-width="1.35" marker-end="url(#arrow)" />

  <path d="M98,138 C132,138 186,138 244,138"
        fill="none" stroke="var(--dia-ink,#27221d)"
        stroke-width="1.35" marker-end="url(#arrow)" />

  <text x="250" y="170" font-size="10.5" text-anchor="middle" fill="var(--dia-mut,#8c8274)">
    existence, even without an explicit rule
  </text>
</svg>
