<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <defs>
    <marker id="ac-b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--dia-acc,#2457c5)" /></marker>
    <marker id="ac-t" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--dia-acc2,#0d9488)" /></marker>
    <marker id="ac-r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--dia-boundary,#dc2626)" /></marker>
  </defs>
  <text x="160" y="22" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">AC: nonempty family ⇒ choice function</text>
  <rect x="26" y="44" width="92" height="110" rx="7" fill="var(--dia-space,#f6f0e4)" stroke="var(--dia-ink,#27221d)" stroke-width="1.4" />
  <text x="72" y="64" font-size="11" text-anchor="middle" fill="var(--dia-mut,#8c8274)">(Aᵢ)ᵢ∈I</text>
  <ellipse cx="72" cy="86" rx="28" ry="12" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-acc,#2457c5)" stroke-width="1.2" />
  <ellipse cx="72" cy="112" rx="30" ry="12" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-acc2,#0d9488)" stroke-width="1.2" />
  <ellipse cx="72" cy="138" rx="26" ry="11" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-boundary,#dc2626)" stroke-width="1.2" />
  <!-- c chooses one element from each set: an arrow per set, color-matched -->
  <path d="M100,86 C150,80 190,82 230,86" fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="1.3" marker-end="url(#ac-b)" />
  <path d="M102,112 C150,112 198,112 244,112" fill="none" stroke="var(--dia-acc2,#0d9488)" stroke-width="1.3" marker-end="url(#ac-t)" />
  <path d="M98,138 C150,144 208,142 257,138" fill="none" stroke="var(--dia-boundary,#dc2626)" stroke-width="1.3" marker-end="url(#ac-r)" />
  <text x="160" y="74" font-size="12" text-anchor="middle" fill="var(--dia-ink,#27221d)" font-style="italic">c</text>
  <rect x="206" y="44" width="88" height="110" rx="7" fill="var(--dia-fill2,#f4efe6)" stroke="var(--dia-ink,#27221d)" stroke-width="1.4" />
  <text x="250" y="64" font-size="11" text-anchor="middle" fill="var(--dia-mut,#8c8274)">c:I→⋃Aᵢ</text>
  <circle cx="236" cy="86" r="3.5" fill="var(--dia-acc,#2457c5)" />
  <circle cx="250" cy="112" r="3.5" fill="var(--dia-acc2,#0d9488)" />
  <circle cx="263" cy="138" r="3.5" fill="var(--dia-boundary,#dc2626)" />
  <text x="250" y="170" font-size="10.5" text-anchor="middle" fill="var(--dia-mut,#8c8274)">existence, even without an explicit rule</text>
</svg>
