<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <!-- ambient space X -->
    <ellipse cx="160" cy="92" rx="138" ry="72" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#27221d)"
        stroke-width="1.6" />
    <text x="282" y="38" font-size="14" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">X</text>
    <!-- topological neighbourhood U: irregular blob (not a circle) -->
    <path d="M98,58 C118,36 178,40 196,62 C214,84 208,132 186,144 C164,156 116,150 98,128 C80,106 78,80 98,58 Z"
        fill="var(--dia-paper,#fffdf8)" stroke="var(--dia-acc,#2457c5)" stroke-width="1.8" stroke-dasharray="5,4" />
    <text x="192" y="55" font-size="12" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">U</text>
    <!-- point x inside U -->
    <circle cx="148" cy="96" r="3.2" fill="var(--dia-ink,#27221d)" />
    <text x="148" y="113" font-size="12" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">x</text>
    <!-- caption -->
    <text x="160" y="176" font-size="10" fill="var(--dia-mut,#8c8274)" text-anchor="middle">open set U with x ∈ U (any
        shape)</text>
</svg>
