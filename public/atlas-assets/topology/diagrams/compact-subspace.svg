<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <!-- ambient space X (dashed boundary) -->
    <rect x="18" y="28" width="284" height="130" rx="4" fill="var(--dia-paper,#fffdf8)" stroke="var(--dia-ink,#27221d)"
        stroke-width="1.4" stroke-dasharray="5,3" />
    <text x="288" y="48" font-size="12" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">X</text>
    <!-- compact subspace K -->
    <ellipse cx="150" cy="100" rx="92" ry="48" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-acc,#2457c5)"
        stroke-width="1.8" />
    <text x="150" y="104" font-size="12" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">K</text>
    <!-- open sets of X (strips crossing over K) -->
    <rect x="44" y="20" width="66" height="30" rx="3" fill="var(--dia-acc,#2457c5)" opacity="0.22"
        stroke="var(--dia-acc,#2457c5)" stroke-width="1" stroke-dasharray="3,2" />
    <rect x="126" y="16" width="66" height="30" rx="3" fill="var(--dia-acc2,#0d9488)" opacity="0.22"
        stroke="var(--dia-acc2,#0d9488)" stroke-width="1" stroke-dasharray="3,2" />
    <rect x="208" y="20" width="66" height="30" rx="3" fill="var(--dia-mut,#8c8274)" opacity="0.22"
        stroke="var(--dia-mut,#8c8274)" stroke-width="1" stroke-dasharray="3,2" />
    <!-- caption -->
    <text x="150" y="170" font-size="10" fill="var(--dia-mut,#8c8274)" text-anchor="middle">open sets of X covering K
        have finite subcover</text>
</svg>
