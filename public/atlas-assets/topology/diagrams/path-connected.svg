<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <!-- Space X -->
    <ellipse cx="160" cy="95" rx="138" ry="70" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#27221d)"
        stroke-width="1.6" />
    <text x="160" y="22" font-size="14" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">X</text>
    <!-- Path between x and y (accent, curved) -->
    <path d="M60,105 C100,45 220,45 260,105" fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="2" />
    <text x="160" y="52" font-size="10" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">γ</text>
    <!-- Points -->
    <circle cx="60" cy="105" r="4" fill="var(--dia-acc,#2457c5)" />
    <text x="48" y="122" font-size="12" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">x</text>
    <circle cx="260" cy="105" r="4" fill="var(--dia-ink,#27221d)" />
    <text x="272" y="122" font-size="12" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">y</text>
    <!-- caption -->
    <text x="160" y="175" font-size="10" fill="var(--dia-mut,#8c8274)" text-anchor="middle">∀ x, y ∈ X, ∃ path γ: x →
        y</text>
</svg>
