<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <!-- ambient space X -->
  <rect x="24" y="34" width="272" height="116" rx="8" fill="var(--dia-paper,#fffdf8)" stroke="var(--dia-ink,#27221d)"
    stroke-width="1.5" />
  <text x="284" y="50" font-size="12" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">X</text>
  <!-- compact neighborhood K around point x -->
  <ellipse cx="120" cy="96" rx="58" ry="40" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#27221d)"
    stroke-width="1.4" />
  <text x="120" y="58" font-size="10" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">compact
    K</text>
  <!-- open neighborhood U inside K -->
  <ellipse cx="120" cy="100" rx="30" ry="20" fill="var(--dia-acc,#2457c5)" opacity="0.18"
    stroke="var(--dia-acc,#2457c5)" stroke-width="1.4" stroke-dasharray="5 3" />
  <!-- the point x -->
  <circle cx="120" cy="100" r="3" fill="var(--dia-acc,#2457c5)" />
  <text x="128" y="98" font-size="12" fill="var(--dia-acc,#2457c5)" font-style="italic">x</text>
  <text x="120" y="128" font-size="10" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">x ∈ U ⊆
    K</text>
  <!-- another point, also has its own compact nbhd -->
  <ellipse cx="228" cy="100" rx="40" ry="28" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-mut,#8c8274)"
    stroke-width="1.2" />
  <circle cx="228" cy="100" r="2.6" fill="var(--dia-mut,#8c8274)" />
  <text x="228" y="160" font-size="10" fill="var(--dia-mut,#8c8274)" text-anchor="middle" font-style="italic">every
    point: a compact neighborhood</text>
</svg>
