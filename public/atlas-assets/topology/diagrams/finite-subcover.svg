<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader', Georgia, serif" role="img" aria-labelledby="compactness-title compactness-desc" text-rendering="geometricPrecision" shape-rendering="geometricPrecision">
  <title id="compactness-title">Compactness: finite subcover</title>
  <desc id="compactness-desc">A compact space X is covered by three open sets U1, U2, and U3. The two colored sets U1 and U2 form a finite subcover of X, while the dashed set U3 is not selected.</desc>

  <!-- Statement -->
  <text x="320" y="60" font-size="24" text-anchor="middle" fill="var(--dia-ink,#27221d)">
    X ⊂ U₁ ∪ U₂
  </text>

  <!-- Space X -->
  <rect x="184" y="152" width="272" height="100" rx="28"
        fill="var(--dia-space,#f6f0e4)"
        stroke="var(--dia-ink,#27221d)"
        stroke-width="2.8"/>

  <text x="320" y="210" font-size="26" text-anchor="middle"
        fill="var(--dia-ink,#27221d)"
        opacity="1">
    X
  </text>

  <!-- Unselected cover member -->
  <rect x="244" y="116" width="152" height="172" rx="18"
        fill="var(--dia-ink,#27221d)"
        fill-opacity="0.08"
        stroke="var(--dia-ink,#27221d)"
        stroke-opacity="0.72"
        stroke-width="2.3"
        stroke-dasharray="8 6"/>

  <text x="320" y="110" font-size="20" text-anchor="middle"
        fill="var(--dia-ink,#27221d)"
        opacity="1">
    U₃
  </text>

  <!-- Selected finite subcover -->
  <rect x="148" y="132" width="208" height="140" rx="18"
        fill="var(--dia-acc,#2457c5)"
        fill-opacity="0.13"
        stroke="var(--dia-acc,#2457c5)"
        stroke-width="2.9"/>

  <text x="174" y="164" font-size="20" text-anchor="middle"
        fill="var(--dia-acc,#2457c5)">
    U₁
  </text>

  <rect x="284" y="132" width="208" height="140" rx="18"
        fill="var(--dia-boundary,#dc2626)"
        fill-opacity="0.13"
        stroke="var(--dia-boundary,#dc2626)"
        stroke-width="2.9"/>

  <text x="466" y="164" font-size="20" text-anchor="middle"
        fill="var(--dia-boundary,#dc2626)">
    U₂
  </text>

  <!-- Mathematical note -->
  <text x="320" y="316" font-size="21" text-anchor="middle"
        fill="var(--dia-ink,#27221d)"
        opacity="0.75">
    {U₁, U₂} is a finite subcover
  </text>
</svg>
