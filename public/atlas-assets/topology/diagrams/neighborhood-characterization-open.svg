<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <!-- ambient space X -->
    <ellipse cx="160" cy="92" rx="138" ry="72" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#27221d)"
        stroke-width="1.6" />

    <text x="282" y="38" font-size="14" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">X</text>

    <!-- open set U -->
    <path d="M70,96 C82,50 128,38 168,50 C218,64 250,102 226,132 C202,162 136,154 96,136 C70,124 62,110 70,96 Z"
        fill="var(--dia-paper,#fffdf8)" stroke="var(--dia-acc,#2457c5)" stroke-width="1.8" />

    <text x="232" y="126" font-size="13" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">U</text>

    <!-- local neighborhoods U_x -->
    <ellipse cx="120" cy="91" rx="27" ry="21" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-acc,#2457c5)"
        stroke-width="1.3" stroke-dasharray="5,4" />

    <ellipse cx="169" cy="108" rx="31" ry="23" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-acc,#2457c5)"
        stroke-width="1.3" stroke-dasharray="5,4" />

    <ellipse cx="196" cy="78" rx="24" ry="18" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-acc,#2457c5)"
        stroke-width="1.3" stroke-dasharray="5,4" />

    <!-- points -->
    <circle cx="120" cy="91" r="3.2" fill="var(--dia-ink,#27221d)" />
    <circle cx="169" cy="108" r="3.2" fill="var(--dia-ink,#27221d)" />
    <circle cx="196" cy="78" r="3.2" fill="var(--dia-ink,#27221d)" />

    <text x="111" y="84" font-size="12" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">x</text>

    <text x="169" y="144" font-size="12" fill="var(--dia-acc,#2457c5)" text-anchor="middle"
        font-style="italic">Uₓ</text>

    <!-- caption -->
    <text x="160" y="176" font-size="10" fill="var(--dia-mut,#8c8274)" text-anchor="middle">for every x ∈ U, some Uₓ
        satisfies x ∈ Uₓ ⊆ U</text>
</svg>
