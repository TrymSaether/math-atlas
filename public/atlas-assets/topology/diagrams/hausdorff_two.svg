<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" width="560" height="380"
    font-family="Georgia, 'Times New Roman', serif">

    <rect width="560" height="380" rx="12" fill="var(--dia-paper,#fffdf8)" />

    <text x="280" y="38" text-anchor="middle" font-size="19" font-weight="bold" fill="var(--dia-ink,#27221d)"
        letter-spacing="0.5">Hausdorff Space (T₂)</text>
    <text x="280" y="58" text-anchor="middle" font-size="12.5" fill="var(--dia-mut,#8c8274)" font-style="italic">Any two
        distinct points can be separated by disjoint open sets</text>

    <ellipse cx="280" cy="220" rx="230" ry="130" fill="none" stroke="var(--dia-mut,#8c8274)" stroke-width="1.8"
        stroke-dasharray="6 4" />
    <text x="495" y="165" font-size="13" fill="var(--dia-mut,#8c8274)" font-style="italic" font-weight="bold">X</text>

    <!-- Open set U — primary accent -->
    <ellipse cx="170" cy="220" rx="95" ry="72" fill="var(--dia-open,#dce8ff)" fill-opacity="0.72"
        stroke="var(--dia-acc,#2457c5)" stroke-width="2.2" />
    <text x="94" y="195" font-size="15" fill="var(--dia-acc,#2457c5)" font-weight="bold" font-style="italic">U</text>

    <!-- Open set V — secondary accent -->
    <ellipse cx="390" cy="220" rx="95" ry="72" fill="var(--dia-acc2,#0d9488)" fill-opacity="0.12"
        stroke="var(--dia-acc2,#0d9488)" stroke-width="2.2" />
    <text x="468" y="195" font-size="15" fill="var(--dia-acc2,#0d9488)" font-weight="bold" font-style="italic">V</text>

    <!-- Gap indicator -->
    <line x1="265" y1="220" x2="295" y2="220" stroke="var(--dia-mut,#8c8274)" stroke-width="1.2"
        stroke-dasharray="3 3" />
    <text x="280" y="215" text-anchor="middle" font-size="10" fill="var(--dia-mut,#8c8274)">∅</text>
    <text x="280" y="228" text-anchor="middle" font-size="8.5" fill="var(--dia-mut,#8c8274)">U∩V</text>

    <!-- Point x -->
    <circle cx="155" cy="220" r="6" fill="var(--dia-acc,#2457c5)" />
    <text x="155" y="208" text-anchor="middle" font-size="14" fill="var(--dia-ink,#27221d)" font-style="italic"
        font-weight="bold">x</text>

    <!-- Point y -->
    <circle cx="405" cy="220" r="6" fill="var(--dia-acc2,#0d9488)" />
    <text x="405" y="208" text-anchor="middle" font-size="14" fill="var(--dia-ink,#27221d)" font-style="italic"
        font-weight="bold">y</text>

    <text x="280" y="178" text-anchor="middle" font-size="12.5" fill="var(--dia-mut,#8c8274)" font-style="italic">x ≠
        y</text>

    <text x="165" y="294" text-anchor="middle" font-size="9.5" fill="var(--dia-acc,#2457c5)"
        font-style="italic">open</text>
    <text x="395" y="294" text-anchor="middle" font-size="9.5" fill="var(--dia-acc2,#0d9488)"
        font-style="italic">open</text>

</svg>
