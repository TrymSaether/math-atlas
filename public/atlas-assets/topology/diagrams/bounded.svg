<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <defs>
    <marker id="bds" markerWidth="8" markerHeight="8" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="var(--dia-acc2,#0d9488)"/></marker>
    <marker id="bde" markerWidth="8" markerHeight="8" refX="1" refY="3" orient="auto"><path d="M6.5,0 L0,3 L6.5,6 Z" fill="var(--dia-acc2,#0d9488)"/></marker>
  </defs>
  <!-- enclosing ball of radius M -->
  <circle cx="150" cy="92" r="72" fill="var(--dia-paper,#fffdf8)" stroke="var(--dia-ink,#27221d)" stroke-width="1.4" stroke-dasharray="6 4"/>
  <!-- the bounded set A (irregular blob) -->
  <path d="M118,70 C150,52 196,66 192,92 C200,118 160,134 132,124 C104,128 96,96 110,84 Z"
        fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-acc,#2457c5)" stroke-width="1.5"/>
  <text x="150" y="98" font-size="14" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">A</text>
  <!-- centre and radius -->
  <circle cx="150" cy="92" r="2.2" fill="var(--dia-ink,#27221d)"/>
  <line x1="150" y1="92" x2="222" y2="92" stroke="var(--dia-acc2,#0d9488)" stroke-width="1.2"/>
  <text x="190" y="86" font-size="11" fill="var(--dia-acc2,#0d9488)" text-anchor="middle" font-style="italic">M</text>
  <!-- diameter caption -->
  <text x="150" y="170" font-size="10" fill="var(--dia-mut,#8c8274)" text-anchor="middle" font-style="italic">A fits in a ball:  d(a₁,a₂) ≤ M  for all a₁,a₂ ∈ A</text>
</svg>
