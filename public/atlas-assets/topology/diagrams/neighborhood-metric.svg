<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <!-- ambient space X -->
    <ellipse cx="160" cy="92" rx="138" ry="72" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#27221d)"
        stroke-width="1.6" />
    <text x="282" y="38" font-size="14" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">X</text>
    <!-- open ball B(x;r) -->
    <circle cx="148" cy="92" r="50" fill="var(--dia-paper,#fffdf8)" stroke="var(--dia-acc,#2457c5)" stroke-width="1.8"
        stroke-dasharray="5,4" />
    <text x="148" y="54" font-size="12" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">B(x;
        r)</text>
    <!-- radius line -->
    <line x1="148" y1="92" x2="198" y2="92" stroke="var(--dia-acc,#2457c5)" stroke-width="1.2" />
    <text x="174" y="86" font-size="12" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">r</text>
    <!-- center point -->
    <circle cx="148" cy="92" r="3.2" fill="var(--dia-ink,#27221d)" />
    <text x="148" y="109" font-size="12" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">x</text>
    <!-- caption -->
    <text x="160" y="176" font-size="10" fill="var(--dia-mut,#8c8274)" text-anchor="middle">{ y ∈ X : d(x, y) &lt; r
        }</text>
</svg>
