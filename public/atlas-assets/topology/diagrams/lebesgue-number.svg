<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <!-- Space X -->
    <rect x="28" y="60" width="264" height="70" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#27221d)" stroke-width="1.4" />
    <!-- open cover strips -->
    <rect x="28" y="50" width="88" height="24" rx="2" fill="var(--dia-acc,#2457c5)" opacity="0.28" stroke="var(--dia-acc,#2457c5)" stroke-width="1" />
    <rect x="102" y="46" width="88" height="24" rx="2" fill="var(--dia-acc2,#0d9488)" opacity="0.28" stroke="var(--dia-acc2,#0d9488)" stroke-width="1" />
    <rect x="200" y="50" width="92" height="24" rx="2" fill="var(--dia-mut,#8c8274)" opacity="0.28" stroke="var(--dia-mut,#8c8274)" stroke-width="1" />
    <text x="160" y="40" font-size="10" fill="var(--dia-mut,#8c8274)" text-anchor="middle">open cover 𝒰</text>
    <!-- a point x -->
    <circle cx="155" cy="95" r="3" fill="var(--dia-ink,#27221d)" />
    <text x="155" y="114" font-size="10" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">x</text>
    <!-- δ-ball fitting inside the teal cover element (accent border) -->
    <rect x="112" y="62" width="86" height="66" rx="5" fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="1.8" stroke-dasharray="4,2" />
    <!-- δ label -->
    <line x1="155" y1="95" x2="198" y2="95" stroke="var(--dia-acc,#2457c5)" stroke-width="1" />
    <text x="178" y="90" font-size="11" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">δ</text>
    <!-- caption -->
    <text x="160" y="152" font-size="10" fill="var(--dia-acc,#2457c5)" text-anchor="middle">B(x, δ) ⊆ some U ∈ 𝒰,  for all x</text>
</svg>
