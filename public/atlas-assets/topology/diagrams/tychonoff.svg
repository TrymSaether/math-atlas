<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <defs>
    <marker id="tya" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-acc,#2457c5)" />
    </marker>
  </defs>
  <!-- family of compact factors -->
  <ellipse cx="56" cy="64" rx="26" ry="17" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#27221d)"
    stroke-width="1.3" />
  <text x="56" y="68" font-size="10" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">X₁</text>
  <ellipse cx="56" cy="104" rx="26" ry="17" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#27221d)"
    stroke-width="1.3" />
  <text x="56" y="108" font-size="10" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">X₂</text>
  <ellipse cx="56" cy="144" rx="26" ry="17" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#27221d)"
    stroke-width="1.3" />
  <text x="56" y="148" font-size="10" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">X₃</text>
  <text x="56" y="34" font-size="10" fill="var(--dia-mut,#8c8274)" text-anchor="middle" font-style="italic">each
    compact</text>
  <text x="56" y="172" font-size="12" fill="var(--dia-ink,#27221d)" text-anchor="middle">⋮</text>
  <!-- product arrow -->
  <line x1="90" y1="104" x2="150" y2="104" stroke="var(--dia-acc,#2457c5)" stroke-width="1.5" marker-end="url(#tya)" />
  <text x="120" y="96" font-size="12" fill="var(--dia-acc,#2457c5)" text-anchor="middle" font-style="italic">∏</text>
  <!-- product space, still compact -->
  <rect x="162" y="58" width="126" height="92" rx="8" fill="var(--dia-fill2,#f4efe6)" stroke="var(--dia-ink,#27221d)"
    stroke-width="1.6" />
  <text x="225" y="100" font-size="14" fill="var(--dia-ink,#27221d)" text-anchor="middle" font-style="italic">∏ᵢ
    Xᵢ</text>
  <text x="225" y="120" font-size="10" fill="var(--dia-acc,#2457c5)" text-anchor="middle"
    font-style="italic">compact</text>
  <text x="225" y="46" font-size="10" fill="var(--dia-mut,#8c8274)" text-anchor="middle" font-style="italic">any family
    — even infinite</text>
</svg>
