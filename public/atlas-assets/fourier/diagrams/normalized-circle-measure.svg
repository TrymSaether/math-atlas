<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <title>Normalized measure on the circle</title>
  <circle cx="108" cy="86" r="54" fill="var(--dia-paper,#fffdf8)" stroke="var(--dia-ink,#27221d)" stroke-width="1.5" />
  <path d="M108 32 A54 54 0 0 1 162 86" fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="5" />
  <path d="M162 86 A54 54 0 0 1 108 140" fill="none" stroke="var(--dia-acc2,#0d9488)" stroke-width="5" />
  <path d="M108 140 A54 54 0 0 1 54 86" fill="none" stroke="var(--dia-fill2,#ddd1bd)" stroke-width="5" />
  <path d="M54 86 A54 54 0 0 1 108 32" fill="none" stroke="var(--dia-boundary,#dc2626)" stroke-width="5" />
  <g stroke="var(--dia-mut,#8c8274)" stroke-width="1">
    <line x1="108" y1="28" x2="108" y2="38" />
    <line x1="166" y1="86" x2="156" y2="86" />
    <line x1="108" y1="144" x2="108" y2="134" />
    <line x1="50" y1="86" x2="60" y2="86" />
  </g>
  <text x="108" y="88" font-size="15" text-anchor="middle" fill="var(--dia-ink,#27221d)">T</text>
  <text x="108" y="158" font-size="11" text-anchor="middle" fill="var(--dia-mut,#8c8274)">total mass 1</text>

  <rect x="188" y="48" width="96" height="76" rx="6" fill="var(--dia-fill,#e7ddc9)"
    stroke="var(--dia-ink,#27221d)" stroke-width="1.2" />
  <text x="236" y="72" font-size="13" text-anchor="middle" fill="var(--dia-ink,#27221d)">dm = dx/(2pi)</text>
  <text x="236" y="96" font-size="12" text-anchor="middle" fill="var(--dia-ink,#27221d)">int_T 1 dm = 1</text>
  <text x="236" y="116" font-size="11" text-anchor="middle" fill="var(--dia-mut,#8c8274)">averages, not totals</text>
</svg>
