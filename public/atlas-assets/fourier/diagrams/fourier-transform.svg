<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <title>Fourier transform maps a signal to its spectrum</title>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="var(--dia-ink,#2a2520)"/>
    </marker>
  </defs>
  <rect x="27" y="36" width="102" height="88" rx="7" fill="var(--dia-paper,#f4efe6)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.4"/>
  <rect x="191" y="36" width="102" height="88" rx="7" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.4"/>
  <path d="M39 88 C52 45 66 45 79 88 S106 131 119 88" fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="1.8"/>
  <line x1="38" y1="88" x2="120" y2="88" stroke="var(--dia-mut,#9a8f7d)" stroke-width="1"/>
  <g fill="var(--dia-acc,#a8431d)">
    <rect x="207" y="84" width="9" height="18" rx="1"/>
    <rect x="226" y="64" width="9" height="38" rx="1"/>
    <rect x="245" y="47" width="9" height="55" rx="1"/>
    <rect x="264" y="76" width="9" height="26" rx="1"/>
  </g>
  <line x1="204" y1="103" x2="280" y2="103" stroke="var(--dia-mut,#9a8f7d)" stroke-width="1"/>
  <path d="M137 80 C154 68 171 68 184 80" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="160" y="64" font-size="14" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">F</text>
  <text x="78" y="145" font-size="12" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">f(x)</text>
  <text x="242" y="145" font-size="12" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">fhat(xi)</text>
</svg>
