<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <title>Complex exponential as rotating phase</title>

  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5.4" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="var(--dia-acc,#2457c5)" />
    </marker>
  </defs>

  <circle cx="92" cy="82" r="54" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#27221d)" stroke-width="1.6" />

  <line x1="38" y1="82" x2="146" y2="82" stroke="var(--dia-mut,#8c8274)" stroke-width="1" />
  <line x1="92" y1="136" x2="92" y2="28" stroke="var(--dia-mut,#8c8274)" stroke-width="1" />

  <path d="M92,82 L128.6,42.3"
        fill="none"
        stroke="var(--dia-acc,#2457c5)"
        stroke-width="2"
        stroke-linecap="round"
        marker-end="url(#arrow)" />

  <path d="M111,82 A19,19 0 0 0 105,68"
        fill="none"
        stroke="var(--dia-acc,#2457c5)"
        stroke-width="1.2"
        stroke-linecap="round" />

  <text x="116" y="72" font-size="12" text-anchor="middle"
        fill="var(--dia-acc,#2457c5)" font-style="italic">nx</text>

  <line x1="174" y1="82" x2="288" y2="82" stroke="var(--dia-mut,#8c8274)" stroke-width="1" />

  <path d="M176,82 C194,46 212,46 230,82 S266,118 284,82"
        fill="none"
        stroke="var(--dia-ink,#27221d)"
        stroke-width="1.6"
        stroke-linecap="round" />

  <path d="M176,82 C194,118 212,118 230,82 S266,46 284,82"
        fill="none"
        stroke="var(--dia-acc,#2457c5)"
        stroke-width="1.6"
        stroke-linecap="round"
        stroke-dasharray="4 3" />

  <text x="198" y="48" font-size="10" text-anchor="middle"
        fill="var(--dia-ink,#27221d)" font-style="italic">cos(nx)</text>

  <text x="266" y="48" font-size="10" text-anchor="middle"
        fill="var(--dia-acc,#2457c5)" font-style="italic">i·sin(nx)</text>

  <text x="160" y="162" font-size="14" text-anchor="middle"
        fill="var(--dia-ink,#27221d)" font-style="italic">
    eⁱⁿˣ = cos(nx) + i·sin(nx)
  </text>
</svg>
