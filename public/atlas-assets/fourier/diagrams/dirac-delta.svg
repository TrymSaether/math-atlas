<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <title>Dirac delta as a unit spike and transform equal to one</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-acc,#a8431d)"/>
    </marker>
  </defs>
  <line x1="36" y1="120" x2="134" y2="120" stroke="var(--dia-ink,#2a2520)" stroke-width="1.2"/>
  <path d="M85 120 L85 44" stroke="var(--dia-acc,#a8431d)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="85" y="140" font-size="12" fill="var(--dia-ink,#2a2520)" text-anchor="middle">delta</text>
  <line x1="185" y1="120" x2="284" y2="120" stroke="var(--dia-ink,#2a2520)" stroke-width="1.2"/>
  <line x1="190" y1="70" x2="280" y2="70" stroke="var(--dia-acc,#a8431d)" stroke-width="2"/>
  <text x="235" y="140" font-size="12" fill="var(--dia-ink,#2a2520)" text-anchor="middle">F delta = 1</text>
  <path d="M145 92 L174 92" stroke="var(--dia-ink,#2a2520)" stroke-width="1.4"/>
  <text x="160" y="82" font-size="13" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">F</text>
</svg>
