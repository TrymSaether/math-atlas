<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <title>FFT butterfly splitting even and odd samples</title>
  <g stroke="var(--dia-ink,#2a2520)" stroke-width="1.4" fill="none">
    <path d="M62 50 L160 72 L258 50"/>
    <path d="M62 118 L160 96 L258 118"/>
    <path d="M62 50 L160 96 L258 118" stroke="var(--dia-acc,#a8431d)"/>
    <path d="M62 118 L160 72 L258 50" stroke="var(--dia-acc,#a8431d)"/>
  </g>
  <g fill="var(--dia-paper,#f4efe6)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.2">
    <circle cx="62" cy="50" r="9"/><circle cx="62" cy="118" r="9"/>
    <circle cx="160" cy="72" r="9"/><circle cx="160" cy="96" r="9"/>
    <circle cx="258" cy="50" r="9"/><circle cx="258" cy="118" r="9"/>
  </g>
  <text x="62" y="33" font-size="10.5" fill="var(--dia-ink,#2a2520)" text-anchor="middle">samples</text>
  <text x="160" y="53" font-size="10.5" fill="var(--dia-ink,#2a2520)" text-anchor="middle">size N/2</text>
  <text x="258" y="33" font-size="10.5" fill="var(--dia-ink,#2a2520)" text-anchor="middle">combine</text>
  <text x="160" y="161" font-size="10.5" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">recursive butterflies reduce O(N^2) work to O(N log N)</text>
</svg>
