<svg viewBox="0 0 360 280" xmlns="http://www.w3.org/2000/svg"
     font-family="'Newsreader',Georgia,serif" role="img">
  <title>Orthogonal projection: f − Sₙf is perpendicular to every vector in Vₙ</title>
  <defs>
    <marker id="op-arr-blue" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="var(--blue,#2563EB)"/>
    </marker>
    <marker id="op-arr-gold" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="var(--gold,#EAB308)"/>
    </marker>
    <marker id="op-arr-acc" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-acc,#a8431d)"/>
    </marker>
  </defs>

  <rect width="360" height="280" fill="var(--dia-paper,#f4efe6)"/>

  <!-- subspace plane Vₙ with light grid lines for depth -->
  <path d="M30,195 L230,138 L330,198 L130,255 Z"
        fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-line,#c5b89a)" stroke-width="1.5"/>
  <!-- grid lines to suggest a flat plane -->
  <line x1="130,255" x2="330,198" y1="255" y2="198"
        stroke="var(--dia-line,#c5b89a)" stroke-width="0.8" opacity="0.6"/>
  <path d="M80,224 L280,167" stroke="var(--dia-line,#c5b89a)" stroke-width="0.8" opacity="0.5"/>
  <path d="M180,145 L280,195" stroke="var(--dia-line,#c5b89a)" stroke-width="0.8" opacity="0.45"/>
  <path d="M80,156 L180,205" stroke="var(--dia-line,#c5b89a)" stroke-width="0.8" opacity="0.45"/>

  <!-- projection vector: f → Sₙf (blue, perpendicular to plane) -->
  <line x1="172" y1="72" x2="172" y2="186"
        stroke="var(--blue,#2563EB)" stroke-width="2.2" marker-end="url(#op-arr-blue)"/>

  <!-- in-plane vector: Sₙf → p (gold) -->
  <line x1="172" y1="195" x2="251" y2="178"
        stroke="var(--gold,#EAB308)" stroke-width="2" marker-end="url(#op-arr-gold)"/>

  <!-- hypotenuse: f → p (dashed, muted) -->
  <line x1="172" y1="72" x2="252" y2="172"
        stroke="var(--dia-acc,#a8431d)" stroke-width="1.5" stroke-dasharray="5,4"
        marker-end="url(#op-arr-acc)" opacity="0.75"/>

  <!-- right angle marker at Sₙf (172, 195) -->
  <path d="M172,195 L172,181 L186,178 L186,192 Z"
        fill="none" stroke="var(--green,#16A34A)" stroke-width="1.6"/>

  <!-- dots -->
  <circle cx="172" cy="62" r="5.5" fill="var(--blue,#2563EB)"/>
  <circle cx="172" cy="195" r="5.5" fill="var(--green,#16A34A)"/>
  <circle cx="258" cy="178" r="5.5" fill="var(--dia-acc,#a8431d)"/>

  <!-- labels -->
  <text x="182" y="61" font-size="14" font-style="italic" fill="var(--dia-ink,#2a2520)">f</text>
  <text x="142" y="218" font-size="12" font-style="italic" fill="var(--dia-ink,#2a2520)">S<tspan dy="3.5" font-size="9">N</tspan><tspan dy="-3.5">f</tspan></text>
  <text x="267" y="180" font-size="12" font-style="italic" fill="var(--dia-ink,#2a2520)">p</text>
  <text x="44" y="248" font-size="12" font-style="italic" fill="var(--dia-mut,#9a8f7d)">V<tspan dy="3.5" font-size="9">N</tspan></text>

  <!-- perpendicularity annotation -->
  <text x="152" y="136" font-size="12" fill="var(--dia-ink,#2a2520)">⊥</text>

  <!-- caption -->
  <text x="180" y="270" font-size="9.5" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">
    f − S<tspan dy="2.5" font-size="7">N</tspan><tspan dy="-2.5">f ⊥ V</tspan><tspan dy="2.5" font-size="7">N</tspan>
  </text>
</svg>
