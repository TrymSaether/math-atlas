<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <title>Integer frequencies close around the circle</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-acc,#2457c5)" />
    </marker>
  </defs>
  <circle cx="104" cy="88" r="54" fill="var(--dia-paper,#fffdf8)" stroke="var(--dia-ink,#27221d)" stroke-width="1.5" />
  <circle cx="104" cy="34" r="3.6" fill="var(--dia-acc,#2457c5)" />
  <path d="M104 34 A54 54 0 1 1 103.5 34" fill="none" stroke="var(--dia-acc,#2457c5)" stroke-width="2.2" marker-end="url(#arrow)" />
  <path d="M104 34 C154 22 166 80 132 112 C105 137 64 116 79 78 C91 49 128 51 139 76" fill="none"
    stroke="var(--dia-acc2,#0d9488)" stroke-width="1.7" stroke-dasharray="5 4" />
  <circle cx="139" cy="76" r="3" fill="var(--dia-acc2,#0d9488)" />

  <line x1="184" y1="52" x2="286" y2="52" stroke="var(--dia-line,#d6ccb8)" stroke-width="1.2" />
  <line x1="184" y1="86" x2="286" y2="86" stroke="var(--dia-line,#d6ccb8)" stroke-width="1.2" />
  <line x1="184" y1="120" x2="286" y2="120" stroke="var(--dia-line,#d6ccb8)" stroke-width="1.2" />
  <text x="184" y="39" font-size="11" fill="var(--dia-mut,#8c8274)">allowed harmonics</text>
  <text x="184" y="56" font-size="12" fill="var(--dia-ink,#27221d)">n = 0, +/-1, +/-2, ...</text>
  <text x="184" y="91" font-size="12" fill="var(--dia-ink,#27221d)">e^{in(x+2pi)} = e^{inx}</text>
  <text x="184" y="125" font-size="12" fill="var(--dia-boundary,#dc2626)">lambda not in Z: phase mismatch</text>
  <text x="104" y="160" font-size="11" fill="var(--dia-mut,#8c8274)" text-anchor="middle">integer turns close on T</text>
</svg>
