<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg"
  font-family="'Newsreader','STIX Two Text','Times New Roman',Georgia,serif" role="img">
  <title>Integer frequencies close around the circle</title>

  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5.4" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="var(--dia-acc,#2457c5)" />
    </marker>
  </defs>
  <!-- circle -->
  <circle cx="104" cy="84" r="52"
          fill="var(--dia-fill,#e7ddc9)"
          stroke="var(--dia-ink,#27221d)"
          stroke-width="1.5" />

  <!-- closed integer turn -->
  <path d="M104,32 A52,52 0 1 1 103.5,32"
        fill="none"
        stroke="var(--dia-acc,#2457c5)"
        stroke-width="2.1"
        stroke-linecap="round"
        marker-end="url(#arrow)" />

  <circle cx="104" cy="32" r="3.4" fill="var(--dia-acc,#2457c5)" />

  <!-- non-integer mismatch -->
  <path d="M104,32 C150,25 158,74 131,104 C108,130 68,112 80,78 C90,51 126,53 138,75"
        fill="none"
        stroke="var(--dia-acc2,#0d9488)"
        stroke-width="1.6"
        stroke-linecap="round"
        stroke-dasharray="5 4" />

  <circle cx="138" cy="75" r="3" fill="var(--dia-acc2,#0d9488)" />

  <!-- annotations -->
  <text x="184" y="42" font-size="10.5" fill="var(--dia-ink,#27221d)">
    allowed harmonics
  </text>

  <text x="184" y="60" font-size="12" fill="var(--dia-ink,#27221d)">
    n = 0, ±1, ±2, …
  </text>

  <line x1="184" y1="72" x2="286" y2="72"
        stroke="var(--dia-line,#d6ccb8)"
        stroke-width="1" />

  <text x="184" y="96" font-size="12" fill="var(--dia-ink,#27221d)">
    eⁱⁿ⁽ˣ⁺²π⁾ = eⁱⁿˣ
  </text>

  <line x1="184" y1="108" x2="286" y2="108"
        stroke="var(--dia-line,#d6ccb8)"
        stroke-width="1" />

  <text x="184" y="130" font-size="12" fill="var(--dia-boundary,#dc2626)">
    λ ∉ ℤ: mismatch
  </text>

  <text x="104" y="158" font-size="10.5"
        fill="var(--dia-ink,#27221d)"
        text-anchor="middle">
    integer turns close on T
  </text>
</svg>
