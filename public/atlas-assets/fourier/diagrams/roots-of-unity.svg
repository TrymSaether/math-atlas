<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <title>Roots of unity on the unit circle</title>
  <circle cx="160" cy="88" r="58" fill="var(--dia-paper,#f4efe6)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.5"/>
  <g stroke="var(--dia-mut,#9a8f7d)" stroke-width="1">
    <line x1="102" y1="88" x2="218" y2="88"/>
    <line x1="160" y1="30" x2="160" y2="146"/>
  </g>
  <g fill="var(--dia-acc,#a8431d)" stroke="var(--dia-ink,#2a2520)" stroke-width="0.6">
    <circle cx="218" cy="88" r="4"/>
    <circle cx="201" cy="129" r="4"/>
    <circle cx="160" cy="146" r="4"/>
    <circle cx="119" cy="129" r="4"/>
    <circle cx="102" cy="88" r="4"/>
    <circle cx="119" cy="47" r="4"/>
    <circle cx="160" cy="30" r="4"/>
    <circle cx="201" cy="47" r="4"/>
  </g>
  <text x="224" y="84" font-size="11" fill="var(--dia-ink,#2a2520)">1</text>
  <text x="205" y="43" font-size="11" fill="var(--dia-ink,#2a2520)" font-style="italic">omega</text>
  <text x="160" y="166" font-size="10.5" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">characters of Z/NZ are powers of a root of unity</text>
</svg>
