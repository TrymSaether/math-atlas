<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <title>Discrete Fourier transform matrix</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-ink,#2a2520)"/>
    </marker>
  </defs>
  <g fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.3">
    <path d="M55 42 Q42 42 42 55 L42 126 Q42 139 55 139"/>
    <path d="M111 42 Q124 42 124 55 L124 126 Q124 139 111 139"/>
    <path d="M214 42 Q201 42 201 55 L201 126 Q201 139 214 139"/>
    <path d="M270 42 Q283 42 283 55 L283 126 Q283 139 270 139"/>
  </g>
  <g font-size="13" fill="var(--dia-ink,#2a2520)" text-anchor="middle">
    <text x="68" y="66">a0</text><text x="68" y="94">a1</text><text x="68" y="122">a2</text>
    <text x="240" y="66">1</text><text x="240" y="94">w</text><text x="240" y="122">w^2</text>
  </g>
  <path d="M133 90 L191 90" stroke="var(--dia-ink,#2a2520)" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="160" y="77" font-size="13" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">DFT</text>
  <text x="160" y="161" font-size="10.5" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">multiply by the character matrix to get frequency coefficients</text>
</svg>
