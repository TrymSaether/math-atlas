<svg viewBox="0 0 360 280" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
      <title>Best approximation: Sₙf is the closest element of Vₙ to f</title>
      <defs>
            <marker id="ba-arr-blue" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
                  <path d="M0,0 L7,3 L0,6 Z" fill="var(--blue,#2563EB)" />
            </marker>
            <marker id="ba-arr-acc" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
                  <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-acc,#2457c5)" />
            </marker>
      </defs>

      <rect width="360" height="280" fill="var(--dia-paper,#fffdf8)" />

      <!-- subspace plane Vₙ -->
      <path d="M30,195 L230,138 L330,198 L130,255 Z" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-line,#d8d0c2)"
            stroke-width="1.5" />

      <!-- best (shortest) projection line: f → Sₙf -->
      <line x1="172" y1="72" x2="172" y2="186" stroke="var(--blue,#2563EB)" stroke-width="2.2"
            marker-end="url(#ba-arr-blue)" />

      <!-- suboptimal line: f → p (dashed, longer) -->
      <line x1="172" y1="72" x2="250" y2="170" stroke="var(--dia-acc,#2457c5)" stroke-width="1.8" stroke-dasharray="5,4"
            marker-end="url(#ba-arr-acc)" />

      <!-- right angle marker at Sₙf (172, 195) -->
      <!-- arm up (toward f) 14px, arm along plane direction 14px -->
      <path d="M172,195 L172,181 L186,178 L186,192 Z" fill="none" stroke="var(--green,#16A34A)" stroke-width="1.6" />

      <!-- dots -->
      <circle cx="172" cy="62" r="5.5" fill="var(--blue,#2563EB)" />
      <circle cx="172" cy="195" r="5.5" fill="var(--green,#16A34A)" />
      <circle cx="258" cy="178" r="5.5" fill="var(--dia-acc,#2457c5)" />

      <!-- label f -->
      <text x="182" y="61" font-size="14" font-style="italic" fill="var(--dia-ink,#27221d)">f</text>

      <!-- label Sₙf -->
      <text x="178" y="218" font-size="12" font-style="italic" fill="var(--dia-ink,#27221d)">S<tspan dy="3.5"
                  font-size="9">N</tspan>
            <tspan dy="-3.5">f</tspan>
      </text>

      <!-- label p -->
      <text x="267" y="180" font-size="12" font-style="italic" fill="var(--dia-ink,#27221d)">p</text>

      <!-- label Vₙ -->
      <text x="44" y="248" font-size="12" font-style="italic" fill="var(--dia-mut,#8c8274)">V<tspan dy="3.5"
                  font-size="9">N</tspan></text>

      <!-- distance labels along lines -->
      <text x="143" y="136" font-size="9.5" text-anchor="middle" fill="var(--blue,#2563EB)">‖f − S<tspan dy="2.5"
                  font-size="7">N</tspan>
            <tspan dy="-2.5">f‖</tspan>
      </text>
      <text x="233" y="117" font-size="9.5" text-anchor="middle" fill="var(--dia-acc,#2457c5)">‖f − p‖</text>

      <!-- caption -->
      <text x="180" y="270" font-size="9.5" fill="var(--dia-mut,#8c8274)" text-anchor="middle">
            ‖f − S<tspan dy="2.5" font-size="7">N</tspan>
            <tspan dy="-2.5">f‖ ≤ ‖f − p‖</tspan> for all p ∈ V<tspan dy="2.5" font-size="7">N</tspan>
      </text>
</svg>
