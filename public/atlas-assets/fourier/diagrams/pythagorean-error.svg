<svg viewBox="0 0 520 420" role="img" aria-label="Pythagorean error diagram">
    <defs>
        <marker id="arrowInk" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
            <path d="M2 2 L10 6 L2 10 Z" fill="#1d1d1f" />
        </marker>
        <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
            <path d="M2 2 L10 6 L2 10 Z" fill="#3f8f68" />
        </marker>
        <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
            <path d="M2 2 L10 6 L2 10 Z" fill="#c79732" />
        </marker>
    </defs>

    <rect width="520" height="420" fill="#fffdf8" />

    <path d="M68 306 L345 222 L462 296 L184 378 Z" fill="#efe7d8" stroke="#d5cab8" stroke-width="2" />

    <circle cx="230" cy="115" r="7" class="dot-blue" />
    <circle cx="230" cy="303" r="7" class="dot-green" />
    <circle cx="372" cy="273" r="7" class="dot-gold" />

