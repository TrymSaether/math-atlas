    <path d="M372 273 L230 115" class="stroke red dash" />

    <path d="M230 303 L250 299 L250 279 L230 284 Z" fill="none" stroke="#3f8f68" stroke-width="2" />

    <text x="241" y="113" class="label math">f</text>
    <text x="185" y="324" class="label math">Sₙf</text>
    <text x="385" y="272" class="label math">p</text>
    <text x="226" y="207" class="tiny math">e</text>
    <text x="300" y="295" class="tiny math">q</text>
    <text x="311" y="178" class="tiny math">d</text>
    <text x="105" y="358" class="label math">Vₙ</text>
    <text x="252" y="286" class="tiny">⊥</text>
</svg>
