<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <defs>
        <radialGradient id="sphereShade" cx="38%" cy="30%" r="68%">
            <stop offset="0%" stop-color="var(--dia-paper,#f4efe6)" />
            <stop offset="58%" stop-color="var(--dia-fill,#e7ddc9)" />
            <stop offset="100%" stop-color="var(--dia-muted-fill,#cfc0a8)" />
        </radialGradient>

        <clipPath id="sphereClip">
            <circle cx="160" cy="86" r="64" />
        </clipPath>
    </defs>

    <circle cx="160" cy="86" r="64" fill="url(#sphereShade)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.6" />

    <g clip-path="url(#sphereClip)">
        <ellipse cx="160" cy="86" rx="58" ry="18" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="0.7"
            opacity="0.18" />

        <ellipse cx="160" cy="86" rx="22" ry="61" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="0.7"
            opacity="0.14" />

        <path d="M106,57 C132,73 188,73 214,57" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="0.7"
            opacity="0.12" />

        <ellipse cx="160" cy="116" rx="54" ry="15" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="0.7"
            opacity="0.10" />
    </g>

    <!-- union cue: dashed boundary for U ∪ V -->
    <path d="M92,84
             C96,55 124,43 151,58
             C176,44 210,58 220,86
             C231,114 208,140 177,132
             C154,149 115,136 100,110
             C94,99 89,91 92,84 Z" fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="1.1"
        stroke-dasharray="4,5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7" />

    <ellipse cx="132" cy="82" rx="32" ry="22" transform="rotate(-18 132 82)" fill="var(--dia-acc,#a8431d)"
        opacity="0.25" stroke="var(--dia-acc,#a8431d)" stroke-width="1.2" />

    <ellipse cx="172" cy="99" rx="34" ry="22" transform="rotate(13 172 99)" fill="var(--dia-acc,#a8431d)" opacity="0.25"
        stroke="var(--dia-acc,#a8431d)" stroke-width="1.2" />

    <text x="160" y="28" font-size="15" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">(X,
        𝒯)</text>

    <text x="224" y="39" font-size="13" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">X</text>

    <text x="122" y="76" font-size="12" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">U</text>

    <text x="179" y="106" font-size="12" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">V</text>

    <text x="155" y="94" font-size="10" fill="var(--dia-acc,#a8431d)" text-anchor="middle"
        font-style="italic">U∩V</text>

    <text x="218" y="123" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="middle"
        font-style="italic">U∪V</text>

    <g font-size="11" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle" font-style="italic">
        <text x="78" y="163">∅, X ∈ 𝒯</text>
        <text x="160" y="163">U∪V ∈ 𝒯</text>
        <text x="244" y="163">U∩V ∈ 𝒯</text>
    </g>
</svg>
