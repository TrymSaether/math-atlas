<svg xmlns="http://www.w3.org/2000/svg" width="640" height="260" viewBox="0 0 640 260" role="img" aria-labelledby="title desc">
  <title id="title">Function or map as a raw arrow</title>
  <desc id="desc">A Math Atlas diagram showing a function or map as a raw arrow from a domain set X to a codomain set Y.</desc>
  <defs>
    <marker id="arrow-accent" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="var(--accent)" />
    </marker>
  </defs>

  <rect width="640" height="260" rx="18" fill="var(--dia-paper)" />

  <ellipse cx="172" cy="132" rx="92" ry="64" fill="var(--dia-fill)" stroke="var(--dia-ink)" stroke-width="1.4" />
  <ellipse cx="468" cy="132" rx="92" ry="64" fill="var(--dia-fill2)" stroke="var(--dia-ink)" stroke-width="1.4" />

  <text x="172" y="92" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="var(--fg-2)">domain</text>
  <text x="468" y="92" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="var(--fg-2)">codomain</text>
  <text x="172" y="139" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="650" fill="var(--dia-ink)">X</text>
  <text x="468" y="139" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="650" fill="var(--dia-ink)">Y</text>

  <line x1="264" y1="132" x2="364" y2="132" stroke="var(--accent)" stroke-width="2.1" stroke-linecap="round" marker-end="url(#arrow-accent)" />
  <text x="320" y="115" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-style="italic" fill="var(--accent)">f</text>

  <circle cx="137" cy="118" r="3.6" fill="var(--accent)" />
  <circle cx="183" cy="150" r="3.6" fill="var(--accent)" />
  <circle cx="210" cy="112" r="3.6" fill="var(--accent)" opacity="0.65" />
  <circle cx="433" cy="116" r="3.6" fill="var(--dia-acc2)" />
  <circle cx="482" cy="151" r="3.6" fill="var(--dia-acc2)" />
  <circle cx="512" cy="120" r="3.6" fill="var(--dia-acc2)" opacity="0.65" />

  <text x="320" y="216" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="var(--fg-2)">minimal data: a rule assigning each input an output</text>
</svg>
