<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <!-- ambient space X -->
    <ellipse cx="160" cy="88" rx="130" ry="64" fill="var(--dia-paper,#f4efe6)" stroke="var(--dia-ink,#2a2520)"
        stroke-width="1.6" />

    <!-- open set U -->
    <path d="M78,92
           C82,48 128,38 162,58
           C198,34 248,55 252,94
           C256,134 207,148 166,128
           C126,150 74,132 78,92 Z" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-acc,#a8431d)" stroke-width="1.6"
        opacity="0.86" />

    <!-- safe interior ball -->
    <circle cx="158" cy="92" r="28" fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="1.8"
        stroke-dasharray="5 4" />

    <!-- radius -->
    <line x1="158" y1="92" x2="186" y2="92" stroke="var(--dia-acc,#a8431d)" stroke-width="1.2" />

    <!-- interior point -->
    <circle cx="158" cy="92" r="3.8" fill="var(--dia-ink,#2a2520)" />

    <!-- boundary point and leaking ball -->
    <circle cx="88" cy="92" r="16" fill="none" stroke="var(--dia-mut,#9a8f7d)" stroke-width="1.2"
        stroke-dasharray="3 4" />

    <circle cx="88" cy="92" r="3" fill="var(--dia-mut,#9a8f7d)" />
    <!-- labels -->
    <text x="265" y="50" font-size="12" fill="var(--dia-ink,#2a2520)" font-style="italic">X</text>
    <text x="226" y="82" font-size="12" fill="var(--dia-acc,#a8431d)" font-style="italic">U</text>

    <text x="149" y="86" font-size="12" fill="var(--dia-ink,#2a2520)" font-style="italic">x</text>
    <text x="174" y="87" font-size="11" fill="var(--dia-acc,#a8431d)" font-style="italic">r</text>
    <text x="158" y="129" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">B(x;r) ⊆
        U</text>

    <text x="78" y="76" font-size="11" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle" font-style="italic">y</text>
    <text x="123" y="95" font-size="10" fill="var(--dia-mut,#9a8f7d)">⊄ U</text>

    <!-- caption -->
    <text x="160" y="168" font-size="10" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">
        distance gives small balls; small balls define open sets
    </text>
</svg>
